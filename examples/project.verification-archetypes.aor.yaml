project_id: verification-archetypes-sample
display_name: Verification Archetypes Sample
repo_topology: bounded-multirepo
asset_mode: materialized
repos:
  - repo_id: node-app
    name: node-app
    source:
      kind: local
      root: apps/node-app
    default_branch: main
    role: application
    build_commands:
      - pnpm --dir apps/node-app build
    test_commands:
      - pnpm --dir apps/node-app test
    lint_commands:
      - pnpm --dir apps/node-app lint
  - repo_id: python-service
    name: python-service
    source:
      kind: local
      root: services/python-service
    default_branch: main
    role: backend
    build_commands: []
    test_commands:
      - python -m pytest
    lint_commands:
      - python -m ruff check .
  - repo_id: workspace
    name: workspace
    source:
      kind: local
      root: .
    default_branch: main
    role: application
    build_commands:
      - pnpm -r build
    test_commands:
      - pnpm -r test
    lint_commands:
      - pnpm -r lint
  - repo_id: browser-app
    name: browser-app
    source:
      kind: local
      root: apps/browser-app
    default_branch: main
    role: frontend
    build_commands:
      - pnpm --dir apps/browser-app build
    test_commands:
      - pnpm --dir apps/browser-app test
      - pnpm --dir apps/browser-app exec playwright test
    lint_commands:
      - pnpm --dir apps/browser-app lint
  - repo_id: docs-only
    name: docs-only
    source:
      kind: local
      root: docs
    default_branch: main
    role: documentation
    build_commands: []
    test_commands: []
    lint_commands: []
  - repo_id: legacy-service
    name: legacy-service
    source:
      kind: local
      root: services/legacy-service
    default_branch: main
    role: backend
    build_commands:
      - make -C services/legacy-service build
    test_commands:
      - make -C services/legacy-service test
    lint_commands: []
repo_graph:
  - from_repo_id: python-service
    to_repo_id: browser-app
    relationship: api-contract
    validation_refs:
      - validation://integration/python-service-browser-app/api-contract
verification:
  command_groups:
    - id: node-app-readiness-install
      repo_id: node-app
      role: setup
      phase: readiness
      enforcement: required
      timeout_class: install
      working_dir: apps/node-app
      detected_from:
        - apps/node-app/package.json#packageManager
        - apps/node-app/pnpm-lock.yaml
      package_manager: pnpm
      tool_requirements:
        - tool: pnpm
          version_range: ">=9"
          install_hint: Enable Corepack or install pnpm before running Node project checks.
      commands:
        - pnpm install --frozen-lockfile
    - id: node-app-baseline-build
      repo_id: node-app
      role: build
      phase: baseline
      enforcement: required
      timeout_class: build
      working_dir: apps/node-app
      depends_on:
        - node-app-readiness-install
      detected_from:
        - apps/node-app/package.json#scripts.build
      package_manager: pnpm
      commands:
        - pnpm run build
    - id: node-app-post-change-test
      repo_id: node-app
      role: test
      phase: post-change
      enforcement: required
      timeout_class: focused-test
      working_dir: apps/node-app
      depends_on:
        - node-app-baseline-build
      detected_from:
        - apps/node-app/package.json#scripts.test
      package_manager: pnpm
      commands:
        - pnpm run test
    - id: python-service-post-change-lint
      repo_id: python-service
      role: lint
      phase: post-change
      enforcement: warn
      timeout_class: quick
      working_dir: services/python-service
      detected_from:
        - services/python-service/pyproject.toml#tool.ruff
      package_manager: pip
      tool_requirements:
        - tool: python
          version_range: ">=3.11"
          install_hint: Use the project Python version before running Python checks.
        - tool: ruff
          install_hint: Install from the Python project optional dev dependencies.
      commands:
        - python -m ruff check .
    - id: python-service-post-change-test
      repo_id: python-service
      role: test
      phase: post-change
      enforcement: required
      timeout_class: focused-test
      working_dir: services/python-service
      detected_from:
        - services/python-service/pyproject.toml#tool.pytest
        - services/python-service/tests
      package_manager: pip
      commands:
        - python -m pytest
    - id: workspace-post-change-full-suite
      repo_id: workspace
      role: full-suite
      phase: post-change
      enforcement: observe
      timeout_class: full-suite
      working_dir: .
      detected_from:
        - pnpm-workspace.yaml
        - package.json#scripts.test
      package_manager: pnpm
      commands:
        - pnpm -r test
    - id: browser-app-post-change-e2e
      repo_id: browser-app
      role: e2e
      phase: post-change
      enforcement: warn
      timeout_class: browser-e2e
      working_dir: apps/browser-app
      detected_from:
        - apps/browser-app/playwright.config.ts
        - apps/browser-app/package.json#scripts.e2e
      package_manager: pnpm
      tool_requirements:
        - tool: playwright
          install_hint: Run the project browser dependency install step before browser e2e checks.
      skip_policy:
        outcome: missing-tool
        applies_when: Playwright browsers are not installed on the operator machine.
        reason: Browser e2e evidence is useful but does not replace required build and focused-test evidence.
      commands:
        - pnpm exec playwright test
    - id: legacy-service-baseline-test
      repo_id: legacy-service
      role: test
      phase: baseline
      enforcement: required
      timeout_class: focused-test
      working_dir: services/legacy-service
      detected_from:
        - services/legacy-service/Makefile#test
      package_manager: custom
      skip_policy:
        outcome: broken-baseline
        applies_when: The unchanged baseline test command fails before AOR applies any target changes.
        reason: A broken baseline must be repaired or explicitly rebaselined before post-change evidence can be accepted.
      commands:
        - make test
  discovery_outcomes:
    - working_dir: docs
      outcome: no-tests
      confidence: low
      source_refs: []
      reason: No recognized project manifest or verification command signal was discovered for the docs-only boundary.
  discovery_suggestions:
    - suggestion_id: custom-verification-needed
      kind: custom
      working_dir: docs
      confidence: low
      source_refs: []
      reason: Add a docs lint or link-check command group when the documentation boundary becomes release-critical.
allowed_providers:
  - openai
  - anthropic
  - open-code
allowed_adapters:
  - codex-cli
  - claude-code
  - open-code
  - mock-runner
registry_roots:
  routes: examples/routes
  wrappers: examples/wrappers
  prompts: examples/prompts
  policies: examples/policies
  adapters: examples/adapters
  evaluation: examples
  skills: examples/skills
  context_docs: examples/context/docs
  context_rules: examples/context/rules
  context_skills: examples/context/skills
  context_bundles: examples/context/bundles
default_route_profiles:
