  artifact: policy.step.artifact.default
  planner: policy.step.planner.default
  runner: policy.step.runner.default
  repair: policy.step.repair.default
  eval: policy.step.eval.default
  harness: policy.step.harness.default
default_wrapper_profiles:
  artifact: wrapper.artifact.default@v1
  planner: wrapper.planner.default@v1
  runner: wrapper.runner.default@v3
  repair: wrapper.repair.default@v1
  eval: wrapper.eval.default@v1
  harness: wrapper.harness.default@v1
default_prompt_bundles:
  discovery: prompt-bundle://discovery-default@v1
  research: prompt-bundle://research-default@v1
  spec: prompt-bundle://spec-default@v1
  planning: prompt-bundle://planner-default@v1
  implement: prompt-bundle://runner-default@v3
  review: prompt-bundle://runner-default@v3
  qa: prompt-bundle://runner-default@v3
  repair: prompt-bundle://repair-default@v1
  eval: prompt-bundle://eval-default@v1
  harness: prompt-bundle://harness-default@v1
default_context_bundles:
  discovery:
    - context-bundle://context.bundle.artifact.foundation@v1
  research:
    - context-bundle://context.bundle.artifact.foundation@v1
  spec:
    - context-bundle://context.bundle.artifact.foundation@v1
  planning:
    - context-bundle://context.bundle.planner.foundation@v1
  implement:
    - context-bundle://context.bundle.runner.foundation@v1
  review:
    - context-bundle://context.bundle.runner.foundation@v1
  qa:
    - context-bundle://context.bundle.runner.foundation@v1
  repair:
    - context-bundle://context.bundle.repair.foundation@v1
  eval:
    - context-bundle://context.bundle.eval.foundation@v1
  harness:
    - context-bundle://context.bundle.harness.foundation@v1
default_skill_profiles:
  artifact:
    - skill.artifact.default@v1
  planner:
    - skill.planner.default@v1
  runner:
    - skill.runner.default@v1
  repair:
    - skill.repair.default@v1
  eval:
    - skill.eval.default@v1
  harness:
    - skill.harness.default@v1
skill_overrides:
  implement:
    - skill.runner.implement@v1
  review:
    - skill.runner.review@v1
  qa:
    - skill.runner.qa@v1
budget_policy:
  default_cost_limit_usd: 75
  default_timeout_sec: 5400
approval_policy:
  required_for_execution: true
  invalidate_on_material_change: true
security_policy:
  redact_secrets: true
  provider_allowlist_enforced: true
eval_policy:
  required_for_release: true
  default_release_suite_ref: suite.release.core@v1
runtime_defaults:
  runtime_root: .aor
  workspace_mode: ephemeral
bootstrap_policy:
  run_project_analysis: true
  require_project_verify: true
writeback_policy:
  default_delivery_mode: fork-first-pr
  allow_direct_write: false
  require_delivery_manifest: true
tooling_policy:
  network_mode: deny-by-default
  mcp_allowlist: []
risk_tiers:
  low:
    require_human_approval: false
  medium:
    require_human_approval: true
  high:
    require_human_approval: true
    require_security_review: true
live_ops:
  enabled: true
  transport: sse
  ui_attachable: true
  ui_catchup_mode: read-model-plus-stream
  retain_logs_days: 30
