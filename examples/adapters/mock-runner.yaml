adapter_id: mock-runner
runner_family: mock
version: 1
launch_modes:
  - non-interactive
capabilities:
  repo_read: true
  repo_write: true
  shell_commands: true
  structured_output: true
  live_logs: true
  mcp_tools: false
  subagents: false
constraints:
  requires_local_runtime: false
  default_network_mode: deny-by-default
  supports_no_write_rehearsal: true
sandbox_mode: in-process
approval_features:
  supports_human_approval: false
  supports_pause_resume: false
log_features:
  stdout: true
  stderr: true
  tool_calls: true
  normalized_summary: true
certification_state: stable
limitations:
  - Deterministic dry-run adapter for tests and rehearsals only.
