adapter_id: codex-cli
runner_family: codex
version: 1
launch_modes:
  - interactive
  - non-interactive
capabilities:
  repo_read: true
  repo_write: true
  shell_commands: true
  structured_output: true
  live_logs: true
  mcp_tools: true
  subagents: true
constraints:
  requires_local_runtime: true
  default_network_mode: deny-by-default
  supports_no_write_rehearsal: true
execution:
  live_baseline: true
  runtime_mode: external-process
  handler: codex-cli-external-runner
  evidence_namespace: evidence://adapter-live/codex-cli
  external_runtime:
    command: codex
    permission_policy:
      default_mode: full-bypass
      modes:
        full-bypass:
          args:
            - --ask-for-approval
            - never
            - exec
            - --json
            - --ephemeral
            - --sandbox
            - workspace-write
        restricted:
          args:
            - exec
            - --json
            - --ephemeral
            - --sandbox
            - workspace-write
    request_via_stdin: true
    preflight_timeout_ms: 120000
    timeout_ms: 3600000
sandbox_mode: local-or-container
approval_features:
  supports_human_approval: true
  supports_pause_resume: true
  continuation_strategy: reinvoke
  approval_grant_scope: step-coarse
  approval_resume_mode: full-bypass
  permission_request_detection:
    - structured-output
    - stdout-stderr-patterns
    - jsonl-events
log_features:
  stdout: true
  stderr: true
  tool_calls: true
  normalized_summary: true
certification_state: stable
