adapter_id: codex-cli
runner_family: codex
version: 1
launch_modes:
  - interactive
  - non-interactive
capabilities:
  repo_read: true
  repo_write: true
  shell_commands: true
  structured_output: true
  live_logs: true
  mcp_tools: true
  subagents: true
constraints:
  requires_local_runtime: true
  default_network_mode: deny-by-default
  supports_no_write_rehearsal: true
execution:
  live_baseline: true
  runtime_mode: in-process-deterministic
  handler: codex-cli-live-baseline
  evidence_namespace: evidence://adapter-live/codex-cli
sandbox_mode: local-or-container
approval_features:
  supports_human_approval: true
  supports_pause_resume: true
log_features:
  stdout: true
  stderr: true
  tool_calls: true
  normalized_summary: true
certification_state: stable
