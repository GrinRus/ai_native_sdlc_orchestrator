adapter_id: open-code
runner_family: opencode
version: 1
launch_modes:
  - interactive
capabilities:
  repo_read: true
  repo_write: true
  shell_commands: true
  structured_output: true
  live_logs: true
  mcp_tools: true
  subagents: true
constraints:
  requires_local_runtime: true
  default_network_mode: deny-by-default
  supports_no_write_rehearsal: true
sandbox_mode: local-or-container
approval_features:
  supports_human_approval: true
  supports_pause_resume: false
log_features:
  stdout: true
  stderr: true
  tool_calls: true
  normalized_summary: true
certification_state: candidate
limitations:
  - Non-interactive automation requires wrapper/policy constraints before promotion.
  - Not a live_baseline adapter until a stable non-interactive external runtime is certified.
