adapter_id: open-code
runner_family: opencode
version: 1
launch_modes:
  - interactive
  - non-interactive
capabilities:
  repo_read: true
  repo_write: true
  shell_commands: true
  structured_output: true
  live_logs: true
  mcp_tools: true
  subagents: true
constraints:
  requires_local_runtime: true
  default_network_mode: deny-by-default
  supports_no_write_rehearsal: true
execution:
  live_baseline: false
  runtime_mode: external-process
  handler: open-code-external-runner
  evidence_namespace: evidence://adapter-live/open-code
  external_runtime:
    command: opencode
    permission_policy:
      default_mode: full-bypass
      modes:
        full-bypass:
          args:
            - run
            - --format
            - json
            - --dangerously-skip-permissions
        restricted:
          args:
            - run
            - --format
            - json
    request_via_stdin: false
    request_transport: request-artifact
    request_file:
      mode: native-file-argument
      message: Execute the approved AOR implementation using the attached AOR provider work packet JSON. Open every required resolved_local_refs[].local_path, make direct edits in the ephemeral target checkout when required, do not write upstream, run requested verification when feasible, and enforce execution_contract.output_quality_policy by fixing warning-producing stdout/stderr from primary or diagnostic verification before final reporting. Return a final report with changed-files, commands-run, verification, and risks. Do not stop after summarizing the packet.
      argument: --file
    preflight_timeout_ms: 120000
    timeout_ms: 3600000
sandbox_mode: local-or-container
approval_features:
  supports_human_approval: true
  supports_pause_resume: false
  continuation_strategy: reinvoke
  approval_grant_scope: step-coarse
  approval_resume_mode: full-bypass
  permission_request_detection:
    - structured-output
    - stdout-stderr-patterns
log_features:
  stdout: true
  stderr: true
  tool_calls: true
  normalized_summary: true
certification_state: candidate
limitations:
  - W22-S03 keeps OpenCode as an extended candidate until a real live certification run promotes it back to required baseline coverage.
