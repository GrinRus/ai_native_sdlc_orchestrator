adapter_id: claude-code
runner_family: claude
version: 1
launch_modes:
  - interactive
  - non-interactive
capabilities:
  repo_read: true
  repo_write: true
  shell_commands: true
  structured_output: true
  live_logs: true
  mcp_tools: true
  subagents: true
constraints:
  requires_local_runtime: true
  default_network_mode: deny-by-default
  supports_no_write_rehearsal: true
execution:
  live_baseline: true
  runtime_mode: external-process
  handler: claude-code-external-runner
  evidence_namespace: evidence://adapter-live/claude-code
  external_runtime:
    command: claude
    permission_policy:
      default_mode: full-bypass
      modes:
        full-bypass:
          args:
            - --print
            - --output-format
            - json
            - --no-session-persistence
            - --dangerously-skip-permissions
        restricted:
          args:
            - --print
            - --output-format
            - json
            - --no-session-persistence
            - --permission-mode
            - auto
    request_via_stdin: false
    request_transport: request-artifact
    request_file:
      mode: pointer-prompt
      message: Execute the approved AOR implementation using the provider work packet at {provider_work_packet_path}. Read it first, open every required resolved_local_refs[].local_path, make direct edits in the ephemeral target checkout when required, do not write upstream, run requested verification when feasible, and return a final report with changed-files, commands-run, verification, and risks. Do not stop after summarizing the packet.
    preflight_timeout_ms: 120000
    timeout_ms: 3600000
sandbox_mode: local-or-container
approval_features:
  supports_human_approval: true
  supports_pause_resume: true
  continuation_strategy: reinvoke
  approval_grant_scope: step-coarse
  approval_resume_mode: full-bypass
  permission_request_detection:
    - structured-output
    - stdout-stderr-patterns
log_features:
  stdout: true
  stderr: true
  tool_calls: true
  normalized_summary: true
certification_state: candidate
limitations:
  - Structured output reliability must be validated via wrapper-level schema checks.
