profile_id: live-e2e.release.short
version: 1
flow_kind: release
duration_class: short
project_profile_template_ref: examples/project.github.aor.yaml
scenario_id: ky-release-short
target_repo:
  repo_id: target
  repo_url: https://github.com/sindresorhus/ky.git
  ref: main
  checkout_strategy: shallow
  write_target: patch-or-fork
preflight:
  mode: no-write
  sequence:
  - clone
  - inspect
  - analyze
  - validate
  - verify
  - stop
  prerequisites:
  - node >=22 with npm available
  - network access for shallow clone and npm install
  repo_shape_notes:
  - single-package TypeScript library with fast test verification
  failure_safe_defaults:
  - keep output_policy.write_back_to_remote set to false
  - allow release artifacts only in patch/local/fork delivery modes
  abort_conditions:
  - repository clone fails or ref cannot be resolved
  - npm test fails during preflight verification
  - release mode requires upstream writes
  reusable_assumptions:
    bootstrap: no-write bootstrap flow is identical to regress-short profile
    quality: review and qa stages assume verify gate passes before release steps
    delivery: release packet and manifest can be generated without upstream push
runtime:
  mode: ephemeral
  runtime_root: .aor
  persist_workspace: false
objective:
  title: Live E2E short release rehearsal on sindresorhus/ky
  task_brief:
  - run a narrow change with review and QA
  - materialize a delivery manifest and release packet
  - keep upstream write-back disabled unless a fork is explicitly configured
  success_definition:
  - execution, review, and qa complete with evidence
  - npm test passes
  - delivery manifest is materialized
  - release packet is materialized
stages:
- bootstrap
- discovery
- spec
- planning
- handoff
- execution
- review
- qa
- delivery
- release
verification:
  build: true
  lint: true
  tests: project-default
  setup_commands:
  - npm install
  - npx playwright install
  commands:
  - npm test
  eval_suites:
  - suite.release.short@v1
  harness:
    enabled: false
budgets:
  wall_clock_limit_min: 35
  max_changed_files: 10
  max_cost_usd: 18
approvals:
  handoff: required
  release: required
output_policy:
  materialize_release_packet: true
  write_back_to_remote: false
  preferred_delivery_mode: patch-only
ui:
  attachable: true
  default_scope: run
