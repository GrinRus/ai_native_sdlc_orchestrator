profile_id: live-e2e.w7.governance.integration
version: 1
flow_kind: governance
duration_class: short
project_profile_template_ref: examples/project.github.aor.yaml
scenario_id: w7-governance-closure
target_repo:
  repo_id: target
  repo_url: https://github.com/sindresorhus/ky.git
  ref: main
  checkout_strategy: shallow
  write_target: patch-or-fork
preflight:
  mode: no-write
  sequence:
  - clone
  - inspect
  - analyze
  - validate
  - verify
  - stop
  prerequisites:
  - node >=22 with npm available
  - network access for shallow clone and npm install
  repo_shape_notes:
  - single-package TypeScript library with fast feedback loops for governance rehearsal
  failure_safe_defaults:
  - keep output_policy.write_back_to_remote set to false
  - keep delivery mode in patch-only for public-target rehearsal safety
  abort_conditions:
  - repository clone fails or ref cannot be resolved
  - npm test fails during preflight verification
  - any command path requires upstream write-back
  reusable_assumptions:
    bootstrap: no-write bootstrap path remains reusable from regress and release profiles
    quality: eval and harness evidence are required before closure checks
    delivery: release packet and manifest can be generated without upstream pushes
runtime:
  mode: ephemeral
  runtime_root: .aor
  persist_workspace: false
objective:
  title: W7 governance integration rehearsal on sindresorhus/ky
  task_brief:
  - execute one bounded run that emits evaluation, harness, and promotion evidence
  - force learning-loop incident materialization for closure audit linkage
  - materialize delivery and release artifacts without upstream write-back
  success_definition:
  - quality evidence and promotion decision are durable
  - incident and learning-loop handoff files are durable and linked to the same run
  - delivery manifest and release packet are materialized in no-write mode
stages:
- bootstrap
- discovery
- spec
- planning
- handoff
- execution
- review
- qa
- delivery
- release
verification:
  build: true
  lint: true
  tests: project-default
  setup_commands:
  - npm install
  - npx playwright install
  commands:
  - npm test
  eval_suites:
  - suite.release.short@v1
  harness:
    enabled: true
budgets:
  wall_clock_limit_min: 40
  max_changed_files: 10
  max_cost_usd: 20
approvals:
  handoff: required
  release: required
output_policy:
  materialize_release_packet: true
  write_back_to_remote: false
  preferred_delivery_mode: patch-only
learning_loop:
  force_incident: true
  backlog_refs:
  - docs/backlog/mvp-implementation-backlog.md
  - docs/backlog/wave-7-implementation-slices.md
  - docs/ops/live-e2e-learning-loop.md
  - docs/ops/live-e2e-w7-governance-closure.md
ui:
  attachable: true
  default_scope: run
