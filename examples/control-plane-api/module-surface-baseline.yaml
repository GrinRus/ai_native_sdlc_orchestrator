        completed_read_only: true
        follow_up_eligible: true
        source_run_id: run.release-readiness
        source_learning_handoff_refs:
          - evidence://.aor/projects/aor-core/reports/learning-loop-handoff-run.release-readiness.json
        recommended_follow_up_source_handoff_ref: evidence://.aor/projects/aor-core/reports/learning-loop-handoff-run.release-readiness.json
      mission_settings:
