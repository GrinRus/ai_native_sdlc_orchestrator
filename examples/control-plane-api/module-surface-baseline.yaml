api_id: control-plane.api.hybrid-surface
version: 1
binding_mode: hybrid-module-and-detached-http-sse
deferred_transport_status: implemented
openapi_contract:
  owning_slice: W30-S03
  status: implemented
  path: docs/contracts/control-plane-api.openapi.json
  drift_check: pnpm production:ready
  scope: current detached HTTP/SSE alpha route surface only

read_operations:
  - operation_id: read.project-state
    operation_family: read
    output_contract_families:
      - project-profile
      - artifact-packet
      - step-result
      - review-decision
      - promotion-decision
      - planner-metrics-snapshot
      - finance-monitoring-snapshot
  - operation_id: read.run-history
    operation_family: read
    output_contract_families:
      - live-run-event
      - step-result
      - delivery-plan
  - operation_id: read.multirepo-coordination
    operation_family: read
    output_contract_families:
      - multirepo-coordination-status
  - operation_id: read.compiler-revisions
    operation_family: read
    output_contract_families:
      - compiler-revision-status
  - operation_id: read.finance-monitoring
    operation_family: read
    output_contract_families:
      - finance-monitoring-snapshot
  - operation_id: read.next-action-report
    operation_family: read
    output_contract_families:
      - next-action-report
  - operation_id: read.operator-requests
    operation_family: read
    output_contract_families:
      - operator-request

run_control_operations:
  - operation_id: run.start
    action: start
    audit_contract_family: live-run-event
  - operation_id: run.pause
    action: pause
    audit_contract_family: live-run-event
  - operation_id: run.resume
    action: resume
    audit_contract_family: live-run-event
  - operation_id: run.steer
    action: steer
    audit_contract_family: live-run-event
  - operation_id: run.cancel
    action: cancel
    audit_contract_family: live-run-event

ui_lifecycle_operations:
  - operation_id: ui.attach
    headless_safe: true
  - operation_id: ui.detach
    headless_safe: true
  - operation_id: ui.state
    headless_safe: true

live_event_operations:
  - operation_id: run.events.follow
    event_contract_family: live-run-event
    replay_supported: true
    backpressure: bounded-replay-window

operator_request_operations:
  owning_slice: W32-S01
  status: implemented-bounded-subset
  request_contract_family: operator-request
  create:
    operation_id: operator-request.create
    route: POST /api/projects/:projectId/operator-requests
    raw_request_text_storage: durable-artifact-only
    read_surface_payload: sanitized-summary-and-refs
  run:
    operation_id: operator-request.run
    route: POST /api/projects/:projectId/operator-requests/:requestId/actions
    action: run
    routed_runtime: true
    context_packet_ref: packet://operator-request
    refreshes_next_action_report: true
  status_read:
    operation_id: operator-request.status
    route: GET /api/projects/:projectId/operator-requests
    raw_request_text_storage: omitted-from-read-surface

lifecycle_command_operations:
  owning_slice: W18-S02
  status: implemented-bounded-subset
  route: POST /api/projects/:projectId/lifecycle-command/actions
  server_owned_flags:
    - project-ref
    - runtime-root
    - help
  commands:
    - operation_id: project.init
      command: project init
    - operation_id: intake.create
      command: intake create
    - operation_id: mission.create
      command: mission create
    - operation_id: next.resolve
      command: next
    - operation_id: discovery.run
      command: discovery run
    - operation_id: spec.build
      command: spec build
    - operation_id: wave.create
      command: wave create
    - operation_id: handoff.prepare
      command: handoff prepare
    - operation_id: handoff.approve
      command: handoff approve
    - operation_id: run.start
      command: run start
    - operation_id: run.pause
      command: run pause
    - operation_id: run.resume
      command: run resume
    - operation_id: run.steer
      command: run steer
    - operation_id: run.cancel
      command: run cancel
    - operation_id: review.run
      command: review run
    - operation_id: review.decide
      command: review decide
    - operation_id: deliver.prepare
      command: deliver prepare
    - operation_id: release.prepare
      command: release prepare
    - operation_id: learning.handoff
      command: learning handoff
  response_contract:
    preserves_cli_command_output: true
    blocked_http_status: 409
    invalid_input_http_status: 400
    evidence_fields:
      - artifact_refs
      - evidence_refs
      - command_output

interactive_continuation:
  owning_slice: W18-S01
  status: implemented-bounded-subset
  request_contract_family: step-result
  event_contract_family: live-run-event
  request_field: requested_interaction
  answer_submission:
    operation_id: run.interaction.answer
    implementation_status: implemented-w18-s02
    route: POST /api/projects/:projectId/interactions/answers
    required_payload_fields:
      - run_id
      - interaction_id
      - answer
    optional_payload_fields:
      - reason
      - approval_ref
      - answer_evidence_ref
    response_fields:
      - interaction_id
      - interaction_status
      - answer_audit_ref
      - step_result_ref
      - run_control_transition
      - blocked_reason
      - blocked_event_id
    blocked_http_status: 409
  audit_behavior:
    raw_answer_storage: durable-audit-evidence-only
    live_event_answer_text: forbidden
    query_safe_refs:
      - requested_interaction
      - answer_audit_ref

deferred_transport:
  owning_slice: W9-S07
  status: implemented
  implemented_mappings:
    - GET /api/projects/:projectId/state
    - GET /api/projects/:projectId/strategic-snapshot
    - GET /api/projects/:projectId/planner-metrics
    - GET /api/projects/:projectId/finance-monitoring
    - GET /api/projects/:projectId/next-action-report
    - GET /api/projects/:projectId/operator-requests
    - GET /api/projects/:projectId/packets
    - GET /api/projects/:projectId/step-results
    - GET /api/projects/:projectId/quality-artifacts
    - GET /api/projects/:projectId/delivery-manifests
    - GET /api/projects/:projectId/promotion-decisions
    - GET /api/projects/:projectId/compiler-revisions
    - GET /api/projects/:projectId/runs
    - GET /api/projects/:projectId/runs/:runId/events/history
    - GET /api/projects/:projectId/runs/:runId/policy-history
    - GET /api/projects/:projectId/runs/:runId/events
    - POST /api/projects/:projectId/run-control/actions
    - POST /api/projects/:projectId/operator-requests
    - POST /api/projects/:projectId/operator-requests/:requestId/actions
    - POST /api/projects/:projectId/ui-lifecycle/actions
    - POST /api/projects/:projectId/lifecycle-command/actions
    - POST /api/projects/:projectId/interactions/answers
  out_of_scope:
    - mutation-command endpoint parity for full CLI surface beyond W18 lifecycle subset
    - production authn/authz policy envelope

authn_authz:
  mode: local-trusted | production-hardened
  defaults:
    mode: local-trusted
  when_enabled:
    required_header: "Authorization: Bearer <token>"
    permission_scopes:
      - read
      - mutate
    permission_declaration:
      local_trusted_default: read+mutate when permissions are omitted for loopback compatibility
      production_hardened_required: explicit non-empty permissions array with read and/or mutate
      production_hardened_missing_or_empty_result: auth.insufficient_permission for every route
    error_codes:
      - auth.missing_credentials
      - auth.invalid_token
      - auth.forbidden_project
      - auth.insufficient_permission

production_hardening:
  owning_slice: W20-S02
  status: implemented-baseline
  transport_modes:
    - mode: local-trusted
      auth_required: false
      intended_scope: loopback development and local harness operation
    - mode: production-hardened
      auth_required: true
      intended_scope: connected operator transport with explicit bearer principals
  authorization:
    route_permission_metadata: required
    permission_declaration: explicit non-empty permissions required in production-hardened mode
    scopes:
      - read
      - mutate
    denied_action_behavior:
      invokes_mutation_handler: false
      audit_reason_shape: auth error with security_mode and required_permission
  redaction:
    configured_secret_sources:
      - bearer token values
      - explicit redaction secret values
      - AOR_REDACTION_SECRETS for CLI JSON output
    response_surfaces:
      - HTTP JSON responses
      - SSE data payloads
      - CLI JSON output
    durable_log_surfaces:
      - live-run-event JSONL payloads
      - run-control audit records
    replacement: "[REDACTED]"
