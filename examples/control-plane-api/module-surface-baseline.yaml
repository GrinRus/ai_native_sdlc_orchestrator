    output_contract_families:
      - live-run-event
      - step-result
      - runtime-harness-report
      - delivery-manifest
      - release-packet
  - operation_id: read.flow-plan
    operation_family: read
    output_contract_families:
      - wave-ticket
      - handoff-packet
  - operation_id: read.flow-plan-progress
    operation_family: read
    output_contract_families:
      - execution-plan
      - task-progress-report

structured_plan_operations:
  owning_wave: W60
  status: implemented
  routes:
    - operation_id: read.flow-plan
      method: GET
      route: /api/projects/:projectId/flows/:flowId/plan
      materializes_artifacts: false
    - operation_id: read.flow-plan-progress
      method: GET
      route: /api/projects/:projectId/flows/:flowId/plan/progress
      materializes_artifacts: false
    - operation_id: mutate.flow-plan
      method: POST
      route: /api/projects/:projectId/flows/:flowId/plan/actions
      actions:
        create: 202
        request_revision: 202
        approve: 200
  blocker_http_status: 409
  contract_families:
    - wave-ticket
    - handoff-packet
    - validation-report
    - evaluation-report
    - execution-plan
    - task-progress-report

project_topology_operations:
  owning_slice: W61-S03
  status: implemented
  workspace_routes:
    - GET /api/projects
    - POST /api/projects/actions
  project_routes:
    - GET /api/projects/:projectId/topology
    - GET /api/projects/:projectId/topology/validation
    - POST /api/projects/:projectId/topology/actions
  revision_protection: expected_revision
  deterministic_validation_before_publish: true
  compatibility_add_action_preserved: true
  contract_families:
    - project-profile
    - project-binding
    - workspace-set

execution_profile_operations:
  owning_slice: W61-S06
  status: implemented
  project_routes:
    - GET /api/projects/:projectId/execution-profile
    - POST /api/projects/:projectId/execution-profile/actions
  actions:
    - select
    - reset
    - check
  persisted_route_source: project-profile.default_route_profiles
  machine_summary_store: local-workspace-registry
  provider_spawn_allowed: false
  contract_families:
    - execution-profile
    - execution-readiness-report
    - provider-route-profile

run_control_operations:
  - operation_id: run.start
    action: start
    audit_contract_family: live-run-event
  - operation_id: run.pause
    action: pause
    audit_contract_family: live-run-event
  - operation_id: run.resume
    action: resume
    audit_contract_family: live-run-event
  - operation_id: run.steer
    action: steer
    audit_contract_family: live-run-event
  - operation_id: run.cancel
    action: cancel
    audit_contract_family: live-run-event

ui_lifecycle_operations:
  - operation_id: ui.attach
    headless_safe: true
  - operation_id: ui.detach
    headless_safe: true
  - operation_id: ui.state
    headless_safe: true

live_event_operations:
  - operation_id: run.events.follow
    event_contract_family: live-run-event
    replay_supported: true
    backpressure: bounded-replay-window

operator_request_operations:
  owning_slice: W32-S01
  status: implemented-bounded-subset
  request_contract_family: operator-request
  create:
    operation_id: operator-request.create
    route: POST /api/projects/:projectId/operator-requests
    raw_request_text_storage: durable-artifact-only
    read_surface_payload: sanitized-summary-and-refs
  run:
    operation_id: operator-request.run
    route: POST /api/projects/:projectId/operator-requests/:requestId/actions
    action: run
    routed_runtime: true
    context_packet_ref: packet://operator-request
    refreshes_next_action_report: true
  status_read:
    operation_id: operator-request.status
    route: GET /api/projects/:projectId/operator-requests
    raw_request_text_storage: omitted-from-read-surface

flow_projection_contract:
  owning_slice: W34-S02
  status: implemented-read-baseline
  source_of_truth:
    product: docs/product/03-flow-centric-console-design.md
    contract: docs/contracts/control-plane-api.md
  projection_fields:
    - flow_id
    - status
    - selected_stage
    - mission_id
    - intake_packet_ref
    - intake_body_ref
    - latest_next_action_report_ref
    - evidence_refs
    - artifact_display_summaries
    - writeback_policy
    - mission_settings
    - closure_state
    - completed_read_only
    - follow_up_source_handoff_ref
  read_models:
    - operation_id: read.flow-list
      route_status: implemented
      route: GET /api/projects/:projectId/flows
      returns: flow_list
      bounded_by: limit
    - operation_id: read.flow-detail
      route_status: implemented
      route: GET /api/projects/:projectId/flows/:flowId
      returns: flow_detail
    - operation_id: read.flow-evidence-graph
      route_status: implemented
      route: GET /api/projects/:projectId/flows/:flowId/evidence-graph
      returns: flow_evidence_graph
      isolation: selected-flow-only
    - operation_id: read.flow-runtime-trace
      route_status: implemented
      route: GET /api/projects/:projectId/flows/:flowId/runtime-trace
      returns: flow_runtime_trace
      isolation: selected-flow-only
    - operation_id: read.selected-flow
      route_status: implemented
      route: GET /api/projects/:projectId/flows/selected
      returns: selected_flow
  lifecycle_semantics:
    new_flow:
      route_family: lifecycle-command
      command_sequence:
        - mission create
        - next
      creates_fresh_intake: true
      refreshes_next_action_report: true
      archives_mission_next_action_report: true
      mutates_completed_source_flow: false
    follow_up_flow:
      lineage_field: follow_up_source_handoff_ref
      lifecycle_flag: --follow-up-source-handoff-ref
      source_flow_read_only: true
      duplicate_settings_create_fresh_intake: true
  example_payloads:
    flow_list:
      selected_flow_id: flow.aor-core.checkout-risk
      active_flow_ids:
        - flow.aor-core.checkout-risk
      completed_flow_ids:
        - flow.aor-core.release-readiness
      flows:
        - flow_id: flow.aor-core.checkout-risk
          status: active
          selected_stage: discovery
          mission_id: checkout-risk
          intake_packet_ref: evidence://.aor/projects/aor-core/artifacts/aor-core.artifact.intake.checkout-risk.v1.json
          latest_next_action_report_ref: evidence://.aor/projects/aor-core/reports/next-action-report-checkout-risk.json
          writeback_policy:
            mode: patch-only
            upstream_writes_default: false
        - flow_id: flow.aor-core.release-readiness
          status: completed
          selected_stage: learning
          mission_id: release-readiness
          intake_packet_ref: evidence://.aor/projects/aor-core/artifacts/aor-core.artifact.intake.release-readiness.v1.json
          latest_next_action_report_ref: evidence://.aor/projects/aor-core/reports/next-action-report-release-readiness.json
          completed_read_only: true
          closure_state:
            status: completed
            completed: true
            completed_read_only: true
            follow_up_eligible: true
            source_run_id: run.release-readiness
            source_learning_handoff_refs:
              - evidence://.aor/projects/aor-core/reports/learning-loop-handoff-run.release-readiness.json
            recommended_follow_up_source_handoff_ref: evidence://.aor/projects/aor-core/reports/learning-loop-handoff-run.release-readiness.json
          mission_settings:
            title: Release readiness
            delivery_mode: no-write
            allowed_paths: []
          writeback_policy:
            mode: no-write
            upstream_writes_default: false
    active_flow:
      flow_id: flow.aor-core.checkout-risk
      status: active
      selected_stage: discovery
      mission_id: checkout-risk
      intake_packet_ref: evidence://.aor/projects/aor-core/artifacts/aor-core.artifact.intake.checkout-risk.v1.json
      intake_body_ref: evidence://.aor/projects/aor-core/artifacts/aor-core.artifact.intake.checkout-risk.v1.body.json
      latest_next_action_report_ref: evidence://.aor/projects/aor-core/reports/next-action-report-checkout-risk.json
      evidence_refs:
        - evidence://.aor/projects/aor-core/artifacts/aor-core.artifact.intake.checkout-risk.v1.json
        - evidence://.aor/projects/aor-core/reports/next-action-report-checkout-risk.json
      mission_settings:
        title: Checkout risk
        delivery_mode: patch-only
        allowed_paths:
          - apps/web/**
      closure_state:
        status: active
        completed: false
        completed_read_only: false
        follow_up_eligible: false
        source_learning_handoff_refs: []
      writeback_policy:
        mode: patch-only
        upstream_writes_default: false
        requires_explicit_review: true
    completed_flow:
      flow_id: flow.aor-core.release-readiness
      status: completed
      selected_stage: learning
      mission_id: release-readiness
      intake_packet_ref: evidence://.aor/projects/aor-core/artifacts/aor-core.artifact.intake.release-readiness.v1.json
      intake_body_ref: evidence://.aor/projects/aor-core/artifacts/aor-core.artifact.intake.release-readiness.v1.body.json
      latest_next_action_report_ref: evidence://.aor/projects/aor-core/reports/next-action-report-release-readiness.json
      completed_read_only: true
      evidence_refs:
        - evidence://.aor/projects/aor-core/reports/review-report-run.release-readiness.json
        - evidence://.aor/projects/aor-core/artifacts/release-packet-run.release-readiness.json
        - evidence://.aor/projects/aor-core/reports/learning-loop-handoff-run.release-readiness.json
      closure_state:
        status: completed
