      command: project init
    - operation_id: intake.create
      command: intake create
    - operation_id: mission.create
      command: mission create
    - operation_id: next.resolve
      command: next
    - operation_id: discovery.run
      command: discovery run
    - operation_id: spec.build
      command: spec build
    - operation_id: wave.create
      command: wave create
    - operation_id: handoff.prepare
      command: handoff prepare
    - operation_id: handoff.approve
      command: handoff approve
    - operation_id: run.start
      command: run start
    - operation_id: run.pause
      command: run pause
    - operation_id: run.resume
      command: run resume
    - operation_id: run.steer
      command: run steer
    - operation_id: run.cancel
      command: run cancel
    - operation_id: review.run
      command: review run
    - operation_id: review.decide
