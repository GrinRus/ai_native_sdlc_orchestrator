  - operation_id: read.compiler-revisions
    operation_family: read
    output_contract_families:
      - compiler-revision-status
  - operation_id: read.finance-monitoring
    operation_family: read
    output_contract_families:
      - finance-monitoring-snapshot
  - operation_id: read.next-action-report
    operation_family: read
    output_contract_families:
      - next-action-report
  - operation_id: read.operator-requests
    operation_family: read
    output_contract_families:
      - operator-request
  - operation_id: read.flow-list
    operation_family: read
    output_contract_families:
      - artifact-packet
      - next-action-report
      - operator-request
  - operation_id: read.flow-detail
    operation_family: read
    output_contract_families:
      - artifact-packet
      - next-action-report
  - operation_id: read.flow-evidence-graph
    operation_family: read
    output_contract_families:
      - artifact-packet
      - next-action-report
      - operator-request
      - step-result
      - runtime-harness-report
      - delivery-manifest
      - release-packet
  - operation_id: read.flow-runtime-trace
