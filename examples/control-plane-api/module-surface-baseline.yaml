        - evidence://.aor/projects/aor-core/artifacts/aor-core.artifact.intake.release-readiness-follow-up.v1.json
        - evidence://.aor/projects/aor-core/reports/next-action-report-release-readiness-follow-up.json
      writeback_policy:
        mode: no-write
        upstream_writes_default: false
        requires_explicit_review: false
    flow_targeted_operator_request_summary:
