wrapper_id: wrapper.artifact.default
version: 1
step_class: artifact
prompt_bundle_ref: prompt-bundle://artifact-default@v1
session_bootstrap:
  include_files:
    - README.md
    - AGENTS.md
tool_policy:
  allow_repo_write: false
  allow_shell: false
  allow_network: false
command_policy:
  allowed: []
output_schema_ref: schema://artifact-packet.v1
verification_section:
  must_produce:
    - packet
redaction_policy_ref: redact://default-secret-safe
