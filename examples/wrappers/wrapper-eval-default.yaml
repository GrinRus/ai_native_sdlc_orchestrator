wrapper_id: wrapper.eval.default
version: 1
step_class: eval
prompt_bundle_ref: prompt-bundle://eval-default@v1
session_bootstrap:
  include_packets:
    - handoff
    - release
tool_policy:
  allow_repo_write: false
  allow_shell: false
  allow_network: false
command_policy:
  allowed: []
output_schema_ref: schema://evaluation-report.v1
verification_section:
  must_produce:
    - evaluation-report
redaction_policy_ref: redact://default-secret-safe
