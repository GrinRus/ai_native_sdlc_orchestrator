wrapper_id: wrapper.repair.default
version: 1
step_class: repair
prompt_bundle_ref: prompt-bundle://repair-default@v1
session_bootstrap:
  include_files:
    - README.md
    - AGENTS.md
  include_packets:
    - handoff
    - validation-report
    - evaluation-report
tool_policy:
  allow_repo_write: true
  allow_shell: true
  allow_network: false
command_policy:
  allowed:
    - pnpm lint
    - pnpm test
output_schema_ref: schema://step-result.repair.v1
verification_section:
  must_run_commands:
    - pnpm lint
    - pnpm test
  must_produce:
    - diff
    - validation-report
redaction_policy_ref: redact://default-secret-safe
