context_rule_id: context.rule.public-repo-safety
version: 1
title: Public repository safety defaults
metadata:
  owner: ai-platform
  lifecycle: draft
  tags:
    - safety
    - delivery
instruction: >-
  Treat public-repo execution as bounded and evidence-first. Prefer no-write or patch-only
  behavior unless delivery policy explicitly approves a stronger write-back mode.
source_refs:
  - docs/architecture/12-orchestrator-operating-model.md
  - docs/contracts/delivery-plan.md
applies_to:
  steps:
    - discovery
    - research
    - spec
    - planning
    - implement
    - review
    - qa
    - repair
    - eval
    - harness
  route_classes:
    - artifact
    - planner
    - runner
    - repair
    - eval
    - harness
