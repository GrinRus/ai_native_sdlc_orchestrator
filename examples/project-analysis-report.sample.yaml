report_id: ANALYZE-001
project_id: github-sandbox
version: 1
generated_from:
  repo_refs:
    - repo_id: target
      ref: main
  sources:
    - README.md
    - AGENTS.md
    - package.json
    - .github/workflows/ci.yaml
repo_facts:
  topology: monorepo
  declared_topology: bounded-multirepo
  declared_repo_count: 3
  declared_repo_ids:
    - backend
    - mobile
    - frontend
  repo_graph:
    - from_repo_id: backend
      to_repo_id: frontend
      relationship: api-contract
      validation_refs:
        - validation://integration/backend-frontend/api-contract
    - from_repo_id: backend
      to_repo_id: mobile
      relationship: api-contract
      validation_refs:
        - validation://integration/backend-mobile/api-contract
  package_manager: pnpm
  languages:
    - typescript
  ci_systems:
    - github-actions
toolchain_facts:
  build_commands:
    - pnpm build
  test_commands:
    - pnpm test
  lint_commands:
    - pnpm lint
command_catalog:
  required_for_smoke_verify:
    - pnpm lint
    - pnpm test -- --runInBand
route_resolution:
  routes_root: examples/routes
  applied_overrides: {}
  matrix:
    - step_class: discovery
      resolved_route_id: route.discovery.default
      resolution_source:
        kind: project-default
        field: default_route_profiles.discovery
    - step_class: planning
      resolved_route_id: route.plan.default
      resolution_source:
        kind: project-default
        field: default_route_profiles.planning
asset_resolution:
  wrappers_root: examples/wrappers
  prompts_root: examples/prompts
  matrix:
    - step_class: planning
      route:
        resolved_route_id: route.plan.default
      wrapper:
        wrapper_ref: wrapper.planner.default@v1
      prompt_bundle:
        prompt_bundle_ref: prompt-bundle://planner-default@v1
policy_resolution:
  policies_root: examples/policies
  applied_overrides: {}
  matrix:
    - step_class: planning
      route:
        resolved_route_id: route.plan.default
      policy:
        policy_id: policy.step.planner.default
      resolved_bounds:
        budget:
          max_cost_usd: 4
          timeout_sec: 300
        retry:
          max_attempts: 1
          on:
            - provider-timeout
        command_constraints:
          allowed_commands:
            - pnpm lint
            - pnpm test
            - pnpm build
        writeback_mode:
          mode: fork-first-pr
evaluation_registry:
  examples_root: examples
  dataset_refs:
    - dataset://run-regression@2026-04-20T08:00:00Z
  suite_refs:
    - suite.release.core@v1
  datasets:
    - dataset_ref: dataset://run-regression@2026-04-20T08:00:00Z
      dataset_id: run-regression
      version: 2026-04-20T08:00:00Z
      subject_type: run
      source: examples/eval/dataset-run-regression.yaml
  suites:
    - suite_ref: suite.release.core@v1
      suite_id: suite.release.core
      version: 1
      subject_type: run
      dataset_ref: dataset://run-regression@2026-04-20T08:00:00Z
      source: examples/eval/suite-release-core.yaml
discovery_completeness:
  status: pass
  blocking: false
  checks:
    - check_id: route-matrix-coverage
      status: pass
      blocking: true
      expected: 10
      actual: 10
      summary: Route matrix includes every supported step class.
    - check_id: asset-matrix-coverage
      status: pass
      blocking: true
      expected: 10
      actual: 10
      summary: Asset matrix includes wrapper and prompt provenance for every supported step class.
    - check_id: policy-matrix-coverage
      status: pass
      blocking: true
      expected: 10
      actual: 10
      summary: Policy matrix includes deterministic bounds for every supported step class.
    - check_id: evaluation-registry-coverage
      status: pass
      blocking: true
      expected: at least one dataset and one suite
      actual: datasets=1, suites=1
      summary: Evaluation registry exposes suite and dataset refs for downstream quality flows.
architecture_traceability:
  architecture_doc_refs:
    - docs/architecture/04-system-of-record-and-core-entities.md
    - docs/architecture/12-orchestrator-operating-model.md
    - docs/architecture/14-cli-command-catalog.md
  contract_refs:
    - docs/contracts/project-analysis-report.md
    - docs/contracts/step-result.md
    - docs/contracts/wave-ticket.md
    - docs/contracts/handoff-packet.md
  planning_artifact_families:
    - project-analysis-report
    - step-result
    - wave-ticket
    - handoff-packet
  step_linkage:
    - step_class: planning
      route_id: route.plan.default
      wrapper_ref: wrapper.planner.default@v1
      prompt_bundle_ref: prompt-bundle://planner-default@v1
      policy_id: policy.step.planner.default
  evaluation_refs:
    suite_refs:
      - suite.release.core@v1
    dataset_refs:
      - dataset://run-regression@2026-04-20T08:00:00Z
repo_scope_proof:
  topology: bounded-multirepo
  repo_count: 3
  repos:
    - repo_id: backend
      name: backend-services
      role: backend
      default_branch: main
      source_kind: git
      source_root: repos/backend
    - repo_id: mobile
      name: mobile-app
      role: mobile
      default_branch: main
      source_kind: git
      source_root: repos/mobile
    - repo_id: frontend
      name: frontend-app
      role: frontend
      default_branch: main
      source_kind: git
      source_root: repos/frontend
  repo_graph:
    - from_repo_id: backend
      to_repo_id: frontend
      relationship: api-contract
      validation_refs:
        - validation://integration/backend-frontend/api-contract
    - from_repo_id: backend
      to_repo_id: mobile
      relationship: api-contract
      validation_refs:
        - validation://integration/backend-mobile/api-contract
  impacted_repo_scope:
    - repo_id: backend
      role: backend
      source_kind: git
      source_root: repos/backend
      default_branch: main
    - repo_id: mobile
      role: mobile
      source_kind: git
      source_root: repos/mobile
      default_branch: main
    - repo_id: frontend
      role: frontend
      source_kind: git
      source_root: repos/frontend
      default_branch: main
  per_repo_validation_evidence:
    - repo_id: backend
      validation_refs:
        - validation://repos/github-sandbox/backend/profile-entry
        - validation://repos/github-sandbox/backend/scope
      command_refs:
        - validation://repos/github-sandbox/backend/test/1
    - repo_id: mobile
      validation_refs:
        - validation://repos/github-sandbox/mobile/profile-entry
        - validation://repos/github-sandbox/mobile/scope
      command_refs:
        - validation://repos/github-sandbox/mobile/test/1
    - repo_id: frontend
      validation_refs:
        - validation://repos/github-sandbox/frontend/profile-entry
        - validation://repos/github-sandbox/frontend/scope
      command_refs:
        - validation://repos/github-sandbox/frontend/test/1
  integration_validation_refs:
    - validation://integration/backend-frontend/api-contract
    - validation://integration/backend-mobile/api-contract
  coordination_required: true
service_boundaries:
  - service_id: api
    paths:
      - apps/api/**
  - service_id: web
    paths:
      - apps/web/**
risk_zones:
  - name: auth
    paths:
      - packages/auth/**
    reason: credential and session handling
