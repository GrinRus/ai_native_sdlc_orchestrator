packet_id: HANDOFF-004
project_id: aor-core
ticket_id: WAVE-004
version: 2
status: approved
risk_tier: medium
approved_objective: >
  Implement bounded multirepo support with repo graph, scoped locks and release delivery manifest.
repo_scopes:
  - repo_id: backend
    paths:
      - repos/backend/**
  - repo_id: mobile
    paths:
      - repos/mobile/**
  - repo_id: frontend
    paths:
      - repos/frontend/**
allowed_paths:
  - repos/backend/**
  - repos/mobile/**
  - repos/frontend/**
allowed_commands:
  - pnpm lint
  - pnpm test
goals:
  - Implement bounded multirepo support without unscoped cross-repository writes.
definition_of_done:
  - Repo graph, scoped locks, delivery manifest, and integration validation evidence are linked.
local_tasks:
  - task_id: local-task.implementation
    objective: Add bounded multirepo support across backend, mobile, and frontend scopes.
    allowed_paths:
      - repos/backend/**
      - repos/mobile/**
      - repos/frontend/**
    acceptance_criteria:
      - Repo graph, scoped locks, delivery manifest, and integration validation evidence are linked.
    expected_evidence:
      - review-report
      - delivery-manifest
  - task_id: local-task.verification
    objective: Run bounded repository checks for the approved multirepo scope.
    verification_commands:
      - pnpm test
    expected_evidence:
      - verify-summary
acceptance_criteria:
  - Repo graph, scoped locks, delivery manifest, and integration validation evidence are linked.
expected_evidence:
  - verify-summary
  - review-report
  - delivery-manifest
verification_expectations:
  primary_commands:
    - pnpm test
  diagnostic_commands:
    - pnpm lint
  diagnostic_failure_mode: warn
scope_constraints:
  max_changed_files: 18
  enforce_repo_scope: true
  require_validation_pass: true
command_policy:
  owner: planner
  allow_unlisted_commands: false
writeback_mode: fork-first-pr
approval_state:
  required: true
  state: approved
  approval_refs:
    - approval://APP-882
required_artifacts:
  - examples/project.bounded-multirepo.aor.yaml
  - docs/architecture/10-multirepo-and-governance.md
  - docs/contracts/project-profile.md
  - docs/contracts/release-packet.md
verification_plan:
  validators:
    - contract-shape
    - repo-scope
    - evidence-complete
  command_groups:
    - id: post-change-test
      role: test
      phase: post-change
      enforcement: required
      timeout_class: focused-test
      commands:
        - pnpm test
    - id: diagnostic-lint
      role: lint
      phase: diagnostic
      enforcement: warn
      timeout_class: quick
      commands:
        - pnpm lint
  commands:
    - pnpm test
route_overrides:
  implement: route.implement.default
approval_refs:
  - approval://APP-882
baseline_refs:
  - route://route.implement.default@stable
coordination_refs:
  - evidence://coordination/WAVE-004/backend-mobile-frontend
integration_validation_refs:
  - validation://integration/backend-frontend/api-contract
  - validation://integration/backend-mobile/api-contract
material_assumptions:
  - No autonomous cross-team orchestration in MVP.
