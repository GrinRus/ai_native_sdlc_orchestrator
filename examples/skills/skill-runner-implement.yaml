skill_id: skill.runner.implement
version: 1
step_class: runner
summary: implementation-focused runner workflow with explicit contract and verification order
activation_hints:
  - implement
workflow:
  - id: resolve-inputs
    instruction: use concrete handoff and spec packet refs from request.context.required_inputs_resolved before globbing the repository
  - id: contract-first
    instruction: confirm contract and interface changes before implementation details
  - id: apply-change
    instruction: implement bounded changes and keep route, policy, and evidence alignment explicit
  - id: verify
    instruction: run required checks against the final edited working tree, without stashing or hiding implementation changes, and capture outputs for delivery/harness reuse
  - id: inspect-verification-output
    instruction: review verification stdout/stderr for warnings introduced by the change, especially resource leaks or deprecations in new tests, and fix them before reporting completion
  - id: block-warning-output
    instruction: treat primary verification stderr warnings as blocking even when the command exits 0; only classify a warning as pre-existing after rerunning the same command on an unchanged baseline and seeing the same warning
required_inputs:
  packets:
    - handoff
    - spec
expected_outputs:
  - diff
  - validation-report
change_notes:
  - step override skill for implement
