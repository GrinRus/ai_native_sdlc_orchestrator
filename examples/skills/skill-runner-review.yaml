skill_id: skill.runner.review
version: 1
step_class: runner
summary: review-focused runner workflow for deterministic risk surfacing
activation_hints:
  - review
workflow:
  - id: inspect-changes
    instruction: assess contract alignment, regression risks, and missing evidence
  - id: inspect-verification-output
    instruction: treat warnings, resource leaks, deprecations, or suspicious stderr in primary verification output as review findings even when commands exit successfully; only classify them as pre-existing with same-command unchanged-baseline evidence
  - id: classify-findings
    instruction: prioritize issues by severity and identify blocking outcomes
  - id: report-review
    instruction: produce concise findings with file-level references and gaps
required_inputs:
  packets:
    - handoff
    - previous-step-result
expected_outputs:
  - review-findings
  - validation-report
change_notes:
  - step override skill for review
