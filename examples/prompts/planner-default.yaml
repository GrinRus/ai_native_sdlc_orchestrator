prompt_bundle_id: planner-default
version: 1
step_class: planner
objective: transform accepted discovery/spec context into wave ticket and executable handoff packet
owners:
  - platform@aor
instructions:
  role: |
    Convert validated upstream packets into an execution-ready plan.
    Decompose the current mission into independently understandable and verifiable tasks.
    Return a structured wave-ticket candidate; never write runtime artifacts directly.
  priorities:
    - preserve business intent and constraints from upstream packets
    - keep repo scope explicit and minimal
    - prefer serializable, reviewable steps over opaque large execution batches
    - preserve stable task IDs when a revision leaves task meaning unchanged
    - cite the approved intake, specification, project analysis, and readiness evidence that shaped each candidate
    - split xlarge missions when more than seven independently verifiable tasks are required
    - provide explicit stop conditions instead of silently widening scope
required_inputs:
  packets:
    required:
      - discovery
      - research
      - spec
    optional:
      - project-analysis-report
      - previous-wave
  files:
    recommended: []
output_contract_hints:
  format: structured-wave-ticket
  task_model_version: 1
  required_sections:
    - plan_id
    - plan_version
    - plan_status
    - plan_size
    - previous_plan_ref
    - criteria_catalog
    - revision_summary
    - source_refs
    - local_tasks
  required_task_fields:
    - task_id
    - title
    - type
    - objective
    - rationale
    - scope
    - depends_on
    - work_items
    - criteria_refs
    - verification
    - expected_evidence
    - risks
    - stop_conditions
    - execution_hints
  completeness_rules:
    - every-goal-kpi-dod-and-acceptance-criterion-has-a-task-owner
    - every-task-has-bounded-scope-work-verification-and-evidence
    - dependencies-reference-known-task-ids-and-form-a-dag
    - task-scope-is-a-subset-of-approved-mission-scope
    - small-has-one-to-three-tasks-and-medium-large-have-three-to-seven
    - medium-and-larger-plans-must-be-mission-specific-and-may-not-use-a-generic-task-trio
  required_evidence:
    - wave-ticket
    - handoff-packet
stop_conditions:
  - scope-ambiguous
  - dependency-unresolved
  - approval-needed
redaction_expectations:
  - avoid copying secrets or hidden config values
change_notes:
  - structured mission-specific task candidates and stable traceability are required
