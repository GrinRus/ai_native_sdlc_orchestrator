scenario_family: release
required_stages:
  - bootstrap
  - discovery
  - spec
  - planning
  - handoff
  - execution
  - review
  - qa
  - delivery
  - release
  - learning
required_evidence:
  - verify-summary
  - routed-step-result
  - runtime-harness-report
  - review-report
  - delivery-manifest
  - release-packet
  - learning-loop-handoff
delivery_mode_policy: fork-first-pr
release_required: true
incident_policy:
  open_on_review_fail: true
  open_on_execution_fail: true
governance_policy:
  mode: release-shaped
  audit_required: true
