catalog_id: commander-js
repo:
  repo_id: tj/commander.js
  repo_url: https://github.com/tj/commander.js.git
  ref: master
  checkout_strategy: shallow
verification:
  setup_commands:
    - npm ci
  commands:
    - npm run test
    - npm run check
safety_defaults:
  write_back_to_remote: false
  preferred_delivery_mode: patch-only
required_matrix_cells:
  - cell_id: commander-js.regress.small.openai
    scenario_family: regress
    feature_size: small
    feature_mission_id: commander-option-suggestion-regression
    provider_variant_id: openai-primary
    coverage_tier: required
  - cell_id: commander-js.repair.medium.anthropic
    scenario_family: repair
    feature_size: medium
    feature_mission_id: commander-help-typing-repair
    provider_variant_id: anthropic-primary
    coverage_tier: required
  - cell_id: commander-js.governance.medium.openai
    scenario_family: governance
    feature_size: medium
    feature_mission_id: commander-cli-governance-lineage
    provider_variant_id: openai-primary
    coverage_tier: required
provider_comparison_pairs:
  - pair_id: commander-js.regress.small
    scenario_family: regress
    feature_size: small
    feature_mission_id: commander-option-suggestion-regression
    provider_variants:
      - openai-primary
      - anthropic-primary
feature_missions:
  - mission_id: commander-option-suggestion-regression
    title: Preserve option suggestion regression behavior
    brief: Add or adjust one focused regression around option parsing, suggestions, or error text while
      keeping the change inside the CLI parser surface.
    feature_size: small
    expected_evidence: &a1
      - verify-summary
      - routed-step-result
      - review-report
    acceptance_checks:
      - keep the change inside parser behavior and tests
      - preserve npm run test and npm run check evidence
    post_run_quality:
      primary_commands:
        - npm run test
        - npm run check
      diagnostic_commands: []
      diagnostic_failure_mode: warn
    supported_scenarios:
      - regress
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 16
      max_added_lines: 900
    size_rationale: Small Commander regressions should stay inside one parser behavior and one test seam.
    change_budget:
      max_changed_files: 16
      max_added_lines: 900
    quality_evidence: *a1
    mission_class: flow-regression
    agent_visible_request:
      user_problem: Add or adjust one focused regression around option parsing, suggestions, or error text
        while keeping the change inside the CLI parser surface.
      desired_outcome: Add or adjust one focused regression around option parsing, suggestions, or error
        text while keeping the change inside the CLI parser surface.
      constraints:
        - Use this mission only as a live E2E canary that proves the public flow still works.
        - Use the target repository conventions and existing test style.
        - Keep upstream writes disabled; materialize delivery evidence only through the configured
          no-write or patch/fork mode.
        - Do not mutate target files directly from the runner or evaluator outside the public AOR
          execution, review, and repair loop.
        - keep the change inside parser behavior and tests
        - preserve npm run test and npm run check evidence
      non_goals:
        - Do not expand this small canary into a product-quality acceptance mission.
        - Do not write provider-local state, editor artifacts, temporary runtime files, or unrelated
          root files into the target diff.
        - Do not bypass AOR review, QA, delivery, or learning artifacts with a direct patch handoff.
    evaluator_rubric:
      quality_gate: flow-health
      step_quality_required: false
      step_quality_dimensions:
        - traceability
        - completeness
        - actionability
        - evidence_strength
        - black_box_boundary
      evidence_expectations:
        - Accepted public step decision refs for the canary flow.
        - verify-summary
        - routed-step-result
        - review-report
        - "Primary verification command: npm run test"
        - "Primary verification command: npm run check"
    final_code_rubric:
      quality_gate: flow-health
      required_changed_surfaces: []
      acceptance_dimensions:
        - flow_completion
        - public_artifact_materialization
        - canary_verification
  - mission_id: commander-help-typing-repair
    title: Repair one help or typing consistency seam
    brief: Fix one bounded help output, TypeScript declaration, or option metadata inconsistency with
      matching regression coverage.
    feature_size: medium
    goals:
      - Repair one help or typing consistency issue without changing unrelated CLI behavior.
    kpis:
      - kpi_id: commander-help-typing-green
        name: Commander help typing gate
        target: npm run test and npm run check pass after the change
        measurement: post-run primary verification
    definition_of_done:
      - Tests cover the repaired help or typing behavior.
      - Review and delivery evidence remain anchored to the target checkout.
    expected_evidence: &a2
      - verify-summary
      - routed-step-result
      - review-report
      - delivery-manifest
    acceptance_checks:
      - preserve public API compatibility for untouched parser surfaces
      - keep delivery evidence anchored to the target checkout
    post_run_quality:
      primary_commands:
        - npm run test
        - npm run check
      diagnostic_commands: []
      diagnostic_failure_mode: warn
    supported_scenarios:
      - repair
      - regress
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 32
      max_added_lines: 2200
    size_rationale: Medium Commander repair may touch runtime and types but should remain inside one
      user-facing command surface.
    change_budget:
      max_changed_files: 32
      max_added_lines: 2200
    quality_evidence: *a2
    mission_class: product-change
    agent_visible_request:
      user_problem: Fix one bounded help output, TypeScript declaration, or option metadata inconsistency
        with matching regression coverage.
      desired_outcome: Tests cover the repaired help or typing behavior. Review and delivery evidence
        remain anchored to the target checkout.
      constraints:
        - Deliver a real product change through the full public AOR flow, not a catalog-only or
          no-op patch.
        - Use the target repository conventions and existing test style.
        - Keep upstream writes disabled; materialize delivery evidence only through the configured
          no-write or patch/fork mode.
        - Do not mutate target files directly from the runner or evaluator outside the public AOR
          execution, review, and repair loop.
        - preserve public API compatibility for untouched parser surfaces
        - keep delivery evidence anchored to the target checkout
      non_goals:
        - Do not satisfy the mission with documentation-only, fixture-only, or metadata-only churn
          unless the requested product behavior explicitly requires it.
        - Do not write provider-local state, editor artifacts, temporary runtime files, or unrelated
          root files into the target diff.
        - Do not bypass AOR review, QA, delivery, or learning artifacts with a direct patch handoff.
    evaluator_rubric:
      quality_gate: accepted-step-quality-required
      step_quality_required: true
      step_quality_dimensions:
        - traceability
        - completeness
        - actionability
        - evidence_strength
        - black_box_boundary
      evidence_expectations:
        - Accepted step-quality assessment report for every public SDLC step before continuation.
        - verify-summary
        - routed-step-result
        - review-report
        - delivery-manifest
        - "Primary verification command: npm run test"
        - "Primary verification command: npm run check"
    final_code_rubric:
      quality_gate: all-pass-product-quality
      required_changed_surfaces: []
      acceptance_dimensions:
        - implementation_correctness
        - implementation_completeness
        - test_adequacy
        - code_maintainability
        - verification_quality
        - delivery_safety
        - acceptance_criteria_traceability
  - mission_id: commander-cli-governance-lineage
    title: Govern one CLI behavior lineage change
    brief: Exercise a broader CLI behavior change with strict review, delivery, audit, and learning
      evidence.
    feature_size: medium
    goals:
      - Preserve governance lineage for one CLI behavior change.
      - Avoid upstream write-back while materializing delivery and learning artifacts.
    kpis:
      - kpi_id: commander-governance-lineage
        name: Commander governance lineage
        target: review, delivery, audit, and learning artifacts preserve the same matrix cell
        measurement: scenario coverage and artifact consistency checks
    definition_of_done:
      - npm run test and npm run check pass.
      - Governance and learning artifacts link to the same mission and target checkout.
    expected_evidence: &a3
      - verify-summary
      - review-report
      - delivery-manifest
      - learning-loop-handoff
    acceptance_checks:
      - keep governance evidence tied to the target checkout
      - avoid any upstream write-back
    post_run_quality:
      primary_commands:
        - npm run test
        - npm run check
      diagnostic_commands: []
      diagnostic_failure_mode: warn
    supported_scenarios:
      - governance
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
      - open-code-primary
    size_budget:
      max_changed_files: 32
      max_added_lines: 2200
    size_rationale: Governance changes may touch runtime, types, and tests, but should remain bounded to
      Commander command behavior.
    change_budget:
      max_changed_files: 32
      max_added_lines: 2200
    quality_evidence: *a3
    mission_class: product-change
    agent_visible_request:
      user_problem: Exercise a broader CLI behavior change with strict review, delivery, audit, and
        learning evidence.
      desired_outcome: npm run test and npm run check pass. Governance and learning artifacts link to the
        same mission and target checkout.
      constraints:
        - Deliver a real product change through the full public AOR flow, not a catalog-only or
          no-op patch.
        - Use the target repository conventions and existing test style.
        - Keep upstream writes disabled; materialize delivery evidence only through the configured
          no-write or patch/fork mode.
        - Do not mutate target files directly from the runner or evaluator outside the public AOR
          execution, review, and repair loop.
        - keep governance evidence tied to the target checkout
        - avoid any upstream write-back
      non_goals:
        - Do not satisfy the mission with documentation-only, fixture-only, or metadata-only churn
          unless the requested product behavior explicitly requires it.
        - Do not write provider-local state, editor artifacts, temporary runtime files, or unrelated
          root files into the target diff.
        - Do not bypass AOR review, QA, delivery, or learning artifacts with a direct patch handoff.
    evaluator_rubric:
      quality_gate: accepted-step-quality-required
      step_quality_required: true
      step_quality_dimensions:
        - traceability
        - completeness
        - actionability
        - evidence_strength
        - black_box_boundary
      evidence_expectations:
        - Accepted step-quality assessment report for every public SDLC step before continuation.
        - verify-summary
        - review-report
        - delivery-manifest
        - learning-loop-handoff
        - "Primary verification command: npm run test"
        - "Primary verification command: npm run check"
    final_code_rubric:
      quality_gate: all-pass-product-quality
      required_changed_surfaces: []
      acceptance_dimensions:
        - implementation_correctness
        - implementation_completeness
        - test_adequacy
        - code_maintainability
        - verification_quality
        - delivery_safety
        - acceptance_criteria_traceability
