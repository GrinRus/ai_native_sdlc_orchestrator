        - Do not bypass AOR review, QA, delivery, or learning artifacts with a direct patch handoff.
    evaluator_rubric:
      quality_gate: accepted-step-quality-required
      step_quality_required: true
      step_quality_dimensions:
        - traceability
        - completeness
        - actionability
        - evidence_strength
        - black_box_boundary
      evidence_expectations:
        - Accepted step-quality assessment report for every public SDLC step before continuation.
        - verify-summary
        - routed-step-result
        - review-report
        - delivery-manifest
        - "Primary verification command: npx xo"
        - "Primary verification command: npm run build"
        - "Primary verification command: npx ava test/retry.ts --match='*shouldRetry*'"
        - "Diagnostic evidence command: npx playwright install"
        - "Diagnostic evidence command: npm test with the timing-sensitive totalTimeout case excluded"
        - "Diagnostic evidence command: isolated timing-sensitive totalTimeout case"
        - Meaningful changed path under source/
        - Meaningful changed path under test/
        - Meaningful changed path under index.d.ts
    final_code_rubric:
      quality_gate: all-pass-product-quality
      required_changed_surfaces:
        - source/
        - test/
        - index.d.ts
      acceptance_dimensions:
        - implementation_correctness
        - implementation_completeness
        - test_adequacy
        - code_maintainability
        - verification_quality
        - delivery_safety
        - acceptance_criteria_traceability
