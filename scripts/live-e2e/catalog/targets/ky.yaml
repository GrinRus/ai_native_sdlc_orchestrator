catalog_id: ky
repo:
  repo_id: sindresorhus/ky
  repo_url: https://github.com/sindresorhus/ky.git
  ref: main
  checkout_strategy: shallow
verification:
  setup_commands:
    - npm install --prefer-offline --no-audit --no-fund
    - npx playwright install
  commands:
    - npm test
safety_defaults:
  write_back_to_remote: false
  preferred_delivery_mode: patch-only
required_matrix_cells:
  - cell_id: ky.regress.small.openai
    scenario_family: regress
    feature_size: small
    feature_mission_id: ky-header-regression
    provider_variant_id: openai-primary
    coverage_tier: required
  - cell_id: ky.regress.medium.anthropic
    scenario_family: regress
    feature_size: medium
    feature_mission_id: ky-fetch-options-regression
    provider_variant_id: anthropic-primary
    coverage_tier: required
  - cell_id: ky.release.medium.openai
    scenario_family: release
    feature_size: medium
    feature_mission_id: ky-release-doc-typing
    provider_variant_id: openai-primary
    coverage_tier: required
  - cell_id: ky.regress.small.open-code
    scenario_family: regress
    feature_size: small
    feature_mission_id: ky-header-regression
    provider_variant_id: open-code-primary
    coverage_tier: extended
  - cell_id: ky.regress.medium.open-code
    scenario_family: regress
    feature_size: medium
    feature_mission_id: ky-fetch-options-regression
    provider_variant_id: open-code-primary
    coverage_tier: extended
  - cell_id: ky.regress.small.qwen
    scenario_family: regress
    feature_size: small
    feature_mission_id: ky-header-regression
    provider_variant_id: qwen-primary
    coverage_tier: extended
  - cell_id: ky.regress.medium.qwen
    scenario_family: regress
    feature_size: medium
    feature_mission_id: ky-fetch-options-regression
    provider_variant_id: qwen-primary
    coverage_tier: extended
  - cell_id: ky.governance.large.openai
    scenario_family: governance
    feature_size: large
    feature_mission_id: ky-retry-hooks-governance
    provider_variant_id: openai-primary
    coverage_tier: extended
  - cell_id: ky.governance.large.anthropic
    scenario_family: governance
    feature_size: large
    feature_mission_id: ky-retry-hooks-governance
    provider_variant_id: anthropic-primary
    coverage_tier: extended
provider_comparison_pairs:
  - pair_id: ky.regress.small
    scenario_family: regress
    feature_size: small
    feature_mission_id: ky-header-regression
    provider_variants:
      - openai-primary
      - anthropic-primary
  - pair_id: ky.release.medium
    scenario_family: release
    feature_size: medium
    feature_mission_id: ky-release-doc-typing
    provider_variants:
      - openai-primary
      - anthropic-primary
  - pair_id: ky.governance.large
    scenario_family: governance
    feature_size: large
    feature_mission_id: ky-retry-hooks-governance
    provider_variants:
      - openai-primary
      - anthropic-primary
manual_matrix_cells:
  - cell_id: ky.governance.xlarge.openai
    scenario_family: governance
    feature_size: xlarge
    feature_mission_id: ky-request-lifecycle-observability-xlarge
    provider_variant_id: openai-primary
    coverage_tier: manual
  - cell_id: ky.governance.xlarge.anthropic
    scenario_family: governance
    feature_size: xlarge
    feature_mission_id: ky-request-lifecycle-observability-xlarge
    provider_variant_id: anthropic-primary
    coverage_tier: manual
feature_missions:
  - mission_id: ky-header-regression
    title: Preserve narrow header-normalization regression coverage
    brief: Add or adjust one bounded regression test around header handling and the
      smallest source fix needed to satisfy it.
    feature_size: small
    goals:
      - Preserve one focused header-normalization behavior with a source or test
        change.
    kpis:
      - kpi_id: ky-header-regression-green
        name: Header regression gate
        target: npx ava test/headers.ts passes after the change
        measurement: post-run primary verification
    definition_of_done:
      - The header regression gate, lint, and build commands pass.
      - Review evidence links the changed paths to the catalog mission.
    expected_evidence: &a1
      - verify-summary
      - routed-step-result
      - review-report
    acceptance_checks:
      - keep changes inside source and test folders only
      - preserve Playwright setup and npm test as full-suite diagnostic evidence
      - pass the mission-scoped headers regression gate
    change_evidence:
      required_path_prefixes:
        - source/
        - test/
    post_run_quality:
      primary_commands:
        - npx xo
        - npm run build
        - npx ava test/headers.ts
      diagnostic_commands:
        - npx playwright install
        - npm test
      diagnostic_failure_mode: warn
    supported_scenarios:
      - regress
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
      - open-code-primary
      - qwen-primary
    size_budget:
      max_changed_files: 6
      max_added_lines: 220
    size_rationale: One narrow library regression should stay inside one behavior
      surface and one test seam.
    change_budget:
      max_changed_files: 6
      max_added_lines: 220
    quality_evidence: *a1
  - mission_id: ky-fetch-options-regression
    title: Extend one bounded fetch-options regression across source and typings
    brief: Adjust one multi-file options-handling or retry-surface regression with
      matching tests and the smallest typing touch needed to keep the public API
      coherent.
    feature_size: medium
    goals:
      - Repair one bounded fetch-options or retry-surface regression across
        source, tests, and type surface.
    kpis:
      - kpi_id: ky-fetch-options-bounded-green
        name: Bounded fetch-options gate
        target: lint, build, and targeted AVA coverage pass after the change
        measurement: post-run primary verification
    definition_of_done:
      - The change stays inside source, tests, and public type surface.
      - Bounded primary verification passes and Playwright-backed full npm test
        is recorded as diagnostic evidence.
    expected_evidence: &a2
      - verify-summary
      - routed-step-result
      - review-report
      - delivery-manifest
    acceptance_checks:
      - keep the fix inside source, tests, and type surface only
      - preserve Playwright setup and npm test as full-suite diagnostic evidence
      - keep delivery evidence anchored to the target checkout
    change_evidence:
      required_path_prefixes:
        - source/
        - test/
        - index.d.ts
    post_run_quality:
      primary_commands:
        - npx xo
        - npm run build
        - "npx ava test/retry.ts --match='*shouldRetry*'"
      diagnostic_commands:
        - npx playwright install
        - npm test
      diagnostic_failure_mode: warn
    supported_scenarios:
      - regress
      - repair
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
      - open-code-primary
      - qwen-primary
    size_budget:
      max_changed_files: 8
      max_added_lines: 300
    size_rationale: Medium ky missions may cross one behavior seam plus one type
      boundary, but should remain bounded to one package.
    change_budget:
      max_changed_files: 8
      max_added_lines: 300
    quality_evidence: *a2
  - mission_id: ky-release-doc-typing
    title: Prepare one release-shaped typed API adjustment
    brief: Land one bounded API or typing fix with matching regression coverage and
      release-ready lineage.
    feature_size: medium
    goals:
      - Land one release-shaped API or typing adjustment with matching
        regression evidence.
      - Preserve patch-only delivery and release lineage without upstream
        write-back.
    kpis:
      - kpi_id: ky-release-typing-lineage
        name: Release typing lineage
        target: delivery-manifest, release-packet, and review-report are materialized
          from the same target checkout
        measurement: live E2E summary and delivery artifacts
      - kpi_id: ky-release-bounded-quality
        name: Bounded release quality gate
        target: lint, build, and targeted AVA coverage pass after the change
        measurement: post-run primary verification
    definition_of_done:
      - Bounded primary verification passes and full npm test is preserved as
        diagnostic evidence.
      - Delivery and release packet evidence are anchored to the target checkout.
      - No upstream write-back is attempted.
    expected_evidence: &a3
      - delivery-manifest
      - release-packet
      - review-report
    acceptance_checks:
      - keep release evidence anchored to the target checkout
      - avoid any upstream write-back
    change_evidence:
      required_path_prefixes:
        - source/
        - test/
        - index.d.ts
    post_run_quality:
      primary_commands:
        - npx xo
        - npm run build
        - npx ava test/hooks.ts
      diagnostic_commands:
        - npx ava test/hooks.ts test/core.ts test/options.ts
      diagnostic_failure_mode: warn
    supported_scenarios:
      - release
      - governance
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 8
      max_added_lines: 260
    size_rationale: Release-shaped ky work can span code, tests, and typings, but
      should still stay within one bounded public API adjustment.
    change_budget:
      max_changed_files: 8
      max_added_lines: 260
    quality_evidence: *a3
  - mission_id: ky-retry-hooks-governance
    title: Exercise one broader retry and hooks governance-safe change
    brief: Touch one broader request lifecycle surface with bounded regression
      coverage, stricter audit expectations, and no control-plane leakage.
    feature_size: large
    goals:
      - Exercise one broader retry or hooks lifecycle change with
        governance-safe evidence.
      - Keep audit, review, and learning closure linked to the target checkout.
    kpis:
      - kpi_id: ky-governance-lineage
        name: Governance lineage
        target: review, delivery, audit, and learning artifacts preserve the same matrix
          cell
        measurement: scenario coverage and artifact consistency checks
    definition_of_done:
      - Bounded primary verification passes and Playwright-backed diagnostic
        full-suite output is recorded.
      - Governance, audit, and learning evidence links back to the mission and
        target checkout.
    expected_evidence: &a4
      - verify-summary
      - routed-step-result
      - review-report
      - delivery-manifest
      - learning-loop-handoff
    acceptance_checks:
      - preserve repo-local request lifecycle boundaries
      - keep governance and audit evidence linked to the target checkout
      - avoid any upstream write-back
    change_evidence:
      required_path_prefixes:
        - source/
        - test/
        - index.d.ts
    post_run_quality:
      primary_commands:
        - npx xo
        - npm run build
        - npx ava test/main.ts test/hooks.ts test/retry.ts
      diagnostic_commands:
        - npx playwright install
        - npm test
      diagnostic_failure_mode: warn
    supported_scenarios:
      - governance
      - repair
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
      - open-code-primary
    size_budget:
      max_changed_files: 12
      max_added_lines: 460
    size_rationale: Large ky missions can cross multiple request lifecycle seams,
      but must still remain inside one repository package and explicit bounds.
    change_budget:
      max_changed_files: 12
      max_added_lines: 460
    quality_evidence: *a4
  - mission_id: ky-request-lifecycle-observability-xlarge
    title: Govern a request lifecycle observability extension
    brief: Manually rehearse a broader request lifecycle change that extends retry,
      hook, and type/documentation surfaces with audit-grade evidence and no
      upstream write-back.
    feature_size: xlarge
    execution_policy: manual-only
    goals:
      - Extend request lifecycle observability across core retry behavior, hook
        state, public types, and tests.
      - Preserve backwards-compatible request lifecycle boundaries and avoid
        provider/control-plane leakage into the target library.
      - Keep audit, review, delivery, and learning closure linked to the target
        checkout.
    kpis:
      - kpi_id: ky-xlarge-lifecycle-depth
        name: Request lifecycle depth
        target: core source, hook/type surface, targeted AVA tests, and
          documentation or type export evidence all trace to one lifecycle intent
        measurement: target diff review plus post-run primary verification
      - kpi_id: ky-xlarge-governance-lineage
        name: Xlarge governance lineage
        target: review, delivery, audit, and learning artifacts preserve the same
          manual matrix cell
        measurement: scenario coverage and artifact consistency checks
    definition_of_done:
      - Bounded primary verification passes and Playwright-backed diagnostic
        full-suite output is recorded.
      - Runtime source, tests, public types, and docs or exported type evidence
        are all present when the change affects public API behavior.
      - Governance, audit, and learning evidence links back to the mission and
        target checkout.
      - No upstream write-back is attempted.
    expected_evidence:
      - verify-summary
      - routed-step-result
      - review-report
      - delivery-manifest
      - learning-loop-handoff
    acceptance_checks:
      - preserve repo-local request lifecycle boundaries
      - require source, tests, public type surface, and docs or export evidence
      - keep governance and audit evidence linked to the target checkout
      - avoid any upstream write-back
    post_run_quality:
      primary_commands:
        - npx xo
        - npm run build
        - npx ava test/main.ts test/hooks.ts
      diagnostic_commands:
        - npx playwright install
        - npm test
      diagnostic_failure_mode: warn
    supported_scenarios:
      - governance
      - repair
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 18
      max_added_lines: 900
    size_rationale: Xlarge ky missions are manual-only because request lifecycle
      API changes can require maintainer judgement over hook ordering, public type
      compatibility, retry semantics, and release risk.
    change_budget:
      max_changed_files: 18
      max_added_lines: 900
    quality_evidence:
      - verify-summary
      - routed-step-result
      - review-report
      - delivery-manifest
      - learning-loop-handoff
