    scenario_family: governance
    feature_size: xlarge
    feature_mission_id: ky-request-lifecycle-observability-xlarge
    provider_variant_id: openai-primary
    coverage_tier: manual
  - cell_id: ky.governance.xlarge.anthropic
    scenario_family: governance
    feature_size: xlarge
    feature_mission_id: ky-request-lifecycle-observability-xlarge
    provider_variant_id: anthropic-primary
    coverage_tier: manual
feature_missions:
  - mission_id: ky-header-regression
    title: Preserve narrow header-normalization regression coverage
    brief: Add or adjust one bounded regression test around header handling and the smallest source fix
      needed to satisfy it.
    feature_size: small
    goals:
      - Preserve one focused header-normalization behavior with a source or test change.
    kpis:
      - kpi_id: ky-header-regression-green
        name: Header regression gate
        target: npx ava test/headers.ts passes after the change
        measurement: post-run primary verification
    definition_of_done:
      - The header regression gate, lint, and build commands pass.
      - Review evidence links the changed paths to the catalog mission.
    expected_evidence: &a1
      - verify-summary
      - routed-step-result
      - review-report
    acceptance_checks:
      - keep changes inside source and test folders only
      - preserve Playwright setup and the complete split AVA suite as diagnostic evidence
      - pass the mission-scoped headers regression gate
    change_evidence:
      required_path_prefixes:
        - source/
        - test/
    post_run_quality:
      primary_commands:
        - npx xo
        - npm run build
        - npx ava test/headers.ts
      diagnostic_commands:
        - npx playwright install
        - npm test -- --match='!*totalTimeout bounds a never-ending successful response body*'
        - npx ava test/main.ts --match='totalTimeout bounds a never-ending successful response body'
      diagnostic_failure_mode: warn
    supported_scenarios:
      - regress
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
      - open-code-primary
      - qwen-primary
    size_budget:
      max_changed_files: 16
      max_added_lines: 900
    size_rationale: One narrow library regression should stay inside one behavior surface and one test seam.
    change_budget:
      max_changed_files: 16
      max_added_lines: 900
    quality_evidence: *a1
    mission_class: flow-regression
    agent_visible_request:
      user_problem: Add or adjust one bounded regression test around header handling and the smallest
        source fix needed to satisfy it.
      desired_outcome: The header regression gate, lint, and build commands pass. Review evidence links
        the changed paths to the catalog mission.
      constraints:
        - Use this mission only as a live E2E canary that proves the public flow still works.
        - Use the target repository conventions and existing test style.
        - Keep upstream writes disabled; materialize delivery evidence only through the configured
          no-write or patch/fork mode.
        - Do not mutate target files directly from the runner or evaluator outside the public AOR
          execution, review, and repair loop.
        - keep changes inside source and test folders only
        - preserve Playwright setup and the complete split AVA suite as diagnostic evidence
        - pass the mission-scoped headers regression gate
      non_goals:
        - Do not expand this small canary into a product-quality acceptance mission.
        - Do not write provider-local state, editor artifacts, temporary runtime files, or unrelated
          root files into the target diff.
        - Do not bypass AOR review, QA, delivery, or learning artifacts with a direct patch handoff.
    evaluator_rubric:
      quality_gate: flow-health
      step_quality_required: false
      step_quality_dimensions:
        - traceability
        - completeness
        - actionability
        - evidence_strength
        - black_box_boundary
      evidence_expectations:
        - Accepted public step decision refs for the canary flow.
        - verify-summary
        - routed-step-result
        - review-report
        - "Primary verification command: npx xo"
        - "Primary verification command: npm run build"
        - "Primary verification command: npx ava test/headers.ts"
        - "Diagnostic evidence command: npx playwright install"
        - "Diagnostic evidence command: npm test with the timing-sensitive totalTimeout case excluded"
        - "Diagnostic evidence command: isolated timing-sensitive totalTimeout case"
        - Meaningful changed path under source/
        - Meaningful changed path under test/
    final_code_rubric:
      quality_gate: flow-health
      required_changed_surfaces:
        - source/
        - test/
      acceptance_dimensions:
        - flow_completion
        - public_artifact_materialization
        - canary_verification
  - mission_id: ky-fetch-options-regression
    title: Extend one bounded fetch-options regression across source and typings
    brief: Adjust one multi-file options-handling or retry-surface regression with matching tests and
      the smallest typing touch needed to keep the public API coherent.
    feature_size: medium
    goals:
      - Repair one bounded fetch-options or retry-surface regression across source, tests, and type
        surface.
    kpis:
      - kpi_id: ky-fetch-options-bounded-green
        name: Bounded fetch-options gate
        target: lint, build, and targeted AVA coverage pass after the change
        measurement: post-run primary verification
    definition_of_done:
      - The change stays inside source, tests, and public type surface.
      - Bounded primary verification passes and the Playwright-backed complete split AVA suite is
        recorded as diagnostic evidence.
    expected_evidence: &a2
      - verify-summary
      - routed-step-result
      - review-report
      - delivery-manifest
    acceptance_checks:
      - keep the fix inside source, tests, and type surface only
      - preserve Playwright setup and the complete split AVA suite as diagnostic evidence
      - keep delivery evidence anchored to the target checkout
    change_evidence:
      required_path_prefixes:
        - source/
        - test/
        - index.d.ts
    post_run_quality:
      primary_commands:
        - npx xo
        - npm run build
        - npx ava test/hooks.ts
        - npx ava test/retry.ts --match='*shouldRetry*'
      diagnostic_commands:
        - npx playwright install
