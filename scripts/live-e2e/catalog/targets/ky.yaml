    size_budget:
      max_changed_files: 32
      max_added_lines: 2200
    size_rationale: Medium ky missions may cross one behavior seam plus one type boundary, but should
      remain bounded to one package.
    change_budget:
      max_changed_files: 32
      max_added_lines: 2200
    quality_evidence: *a2
    mission_class: product-change
    agent_visible_request:
      user_problem: Adjust one multi-file options-handling or retry-surface regression with matching tests
