catalog_id: nextjs-monorepo-example
repo:
  repo_id: belgattitude/nextjs-monorepo-example
  repo_url: https://github.com/belgattitude/nextjs-monorepo-example.git
  ref: main
  checkout_strategy: shallow
verification:
  setup_commands:
    - yarn install --immutable
  commands:
    - yarn g:lint
    - yarn g:typecheck
    - yarn workspace @your-org/ts-utils test-unit
    - yarn workspace @your-org/core-lib test-unit
safety_defaults:
  write_back_to_remote: false
  preferred_delivery_mode: fork-first-pr
required_matrix_cells:
  - cell_id: nextjs.release.large.openai
    scenario_family: release
    feature_size: large
    feature_mission_id: nextjs-shared-package-release
    provider_variant_id: openai-primary
    coverage_tier: required
  - cell_id: nextjs.repair.medium.anthropic
    scenario_family: repair
    feature_size: medium
    feature_mission_id: nextjs-workspace-repair-shared-config
    provider_variant_id: anthropic-primary
    coverage_tier: required
  - cell_id: nextjs.governance.large.openai
    scenario_family: governance
    feature_size: large
    feature_mission_id: nextjs-shared-package-release
    provider_variant_id: openai-primary
    coverage_tier: required
  - cell_id: nextjs.regress.small.openai
    scenario_family: regress
    feature_size: small
    feature_mission_id: nextjs-shared-util-regression
    provider_variant_id: openai-primary
    coverage_tier: extended
provider_comparison_pairs:
  - pair_id: nextjs.release.large
    scenario_family: release
    feature_size: large
    feature_mission_id: nextjs-shared-package-release
    provider_variants:
      - openai-primary
      - anthropic-primary
manual_matrix_cells:
  - cell_id: nextjs.release.xlarge.openai
    scenario_family: release
    feature_size: xlarge
    feature_mission_id: nextjs-cross-package-release-orchestration
    provider_variant_id: openai-primary
    coverage_tier: manual
  - cell_id: nextjs.release.xlarge.anthropic
    scenario_family: release
    feature_size: xlarge
    feature_mission_id: nextjs-cross-package-release-orchestration
    provider_variant_id: anthropic-primary
    coverage_tier: manual
feature_missions:
  - mission_id: nextjs-shared-util-regression
    title: Preserve one narrow shared-package regression
    brief: Fix one narrowly scoped shared-package regression with the smallest app
      or package touch needed to keep the monorepo green.
    feature_size: small
    expected_evidence: &a1
      - verify-summary
      - routed-step-result
      - review-report
    acceptance_checks:
      - keep the change inside one shared package or one consuming app boundary
      - preserve monorepo lint/typecheck plus shared-package unit smoke linkage
    supported_scenarios:
      - regress
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 8
      max_added_lines: 260
    size_rationale: Small monorepo missions should stay inside one package or one
      consumer boundary with limited diff size.
    change_budget:
      max_changed_files: 8
      max_added_lines: 260
    quality_evidence: *a1
  - mission_id: nextjs-workspace-repair-shared-config
    title: Repair one bounded workspace configuration or shared package seam
    brief: Fix one bounded monorepo breakage across a shared package and one
      consuming app or config boundary, with strong delivery and audit lineage.
    feature_size: medium
    goals:
      - Repair one bounded workspace configuration or shared package seam.
      - Preserve monorepo lint, typecheck, and shared-package unit-smoke
        evidence.
    kpis:
      - kpi_id: nextjs-medium-repair-green
        name: Medium monorepo repair gate
        target: lint, typecheck, and shared-package unit smoke pass after the change
        measurement: post-run primary verification
    definition_of_done:
      - The change stays inside bounded apps, packages, and tooling surfaces.
      - Delivery and review evidence are anchored to the target checkout.
    expected_evidence: &a2
      - verify-summary
      - routed-step-result
      - review-report
      - delivery-manifest
    acceptance_checks:
      - keep the change inside monorepo apps, packages, and bounded tooling
        surfaces
      - preserve monorepo lint/typecheck plus shared-package unit smoke linkage
      - keep delivery evidence anchored to the target checkout
    post_run_quality:
      primary_commands:
        - yarn g:lint
        - yarn g:typecheck
        - yarn workspace @your-org/ts-utils test-unit
      diagnostic_commands:
        - yarn workspace @your-org/core-lib test-unit
      diagnostic_failure_mode: warn
    supported_scenarios:
      - repair
      - governance
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 12
      max_added_lines: 360
    size_rationale: Medium monorepo missions may cross one package-to-app or
      package-to-tooling boundary, but should remain explicitly bounded.
    change_budget:
      max_changed_files: 12
      max_added_lines: 360
    quality_evidence: *a2
  - mission_id: nextjs-shared-package-release
    title: Prepare one shared-package release-shaped change
    brief: Update one shared package and one consuming app with bounded release
      evidence and no upstream write-back.
    feature_size: large
    goals:
      - Prepare one shared-package release-shaped change across a bounded
        package/app boundary.
      - Preserve release lineage without upstream write-back.
    kpis:
      - kpi_id: nextjs-release-lineage
        name: Monorepo release lineage
        target: delivery-manifest, release-packet, and review-report are materialized
          from the same target checkout
        measurement: live E2E summary and delivery artifacts
      - kpi_id: nextjs-release-quality
        name: Monorepo release quality gate
        target: lint, typecheck, and shared-package unit smoke pass after the change
        measurement: post-run primary verification
    definition_of_done:
      - Bounded monorepo quality gates pass.
      - Delivery and release packet evidence are anchored to the target checkout.
      - No upstream write-back is attempted.
    expected_evidence: &a3
      - delivery-manifest
      - release-packet
      - review-report
    acceptance_checks:
      - keep changes inside apps and packages only
      - preserve monorepo lint/typecheck plus shared-package unit smoke linkage
    post_run_quality:
      primary_commands:
        - yarn g:lint
        - yarn g:typecheck
        - yarn workspace @your-org/ts-utils test-unit
        - yarn workspace @your-org/core-lib test-unit
      diagnostic_commands: []
      diagnostic_failure_mode: warn
    supported_scenarios:
      - release
      - governance
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
      - open-code-primary
    size_budget:
      max_changed_files: 14
      max_added_lines: 420
    size_rationale: Large monorepo release missions may cross multiple packages and
      one consuming app, but must remain bounded to apps/packages and strict
      release evidence.
    change_budget:
      max_changed_files: 14
      max_added_lines: 420
    quality_evidence: *a3
  - mission_id: nextjs-cross-package-release-orchestration
    title: Orchestrate a cross-package app release rehearsal
    brief: Manually rehearse a broad release-shaped change that updates multiple
      shared package surfaces and at least one consuming app path with bounded
      release, review, QA, and learning evidence.
    feature_size: xlarge
    execution_policy: manual-only
    goals:
      - Change at least two shared package or package-to-app boundaries with
        one coherent release intent.
      - Prove that the consuming app uses the changed shared package behavior in
        runtime code, not only in package metadata.
      - Preserve release lineage without upstream write-back.
    kpis:
      - kpi_id: nextjs-xlarge-release-depth
        name: Cross-package release depth
        target: source, tests, package metadata, changelog or changeset, and app
          integration all trace to one release intent
        measurement: target diff review plus post-run primary verification
      - kpi_id: nextjs-xlarge-release-lineage
        name: Xlarge release lineage
        target: delivery-manifest, release-packet, review-report, QA evidence,
          and learning handoff are materialized from the same target checkout
        measurement: live E2E summary and delivery artifacts
    definition_of_done:
      - Bounded monorepo quality gates pass.
      - The target diff includes runtime source, tests, and release notes or
        changeset evidence.
      - At least one consuming app path exercises the changed shared package API.
      - Delivery and release packet evidence are anchored to the target checkout.
      - No upstream write-back is attempted.
    expected_evidence:
      - delivery-manifest
      - release-packet
      - review-report
      - learning-loop-handoff
    acceptance_checks:
      - keep changes inside apps and packages only
      - require source, tests, release notes or changeset, and consuming app usage
      - reject native-wrapper-only utilities as insufficient for xlarge
      - preserve monorepo lint/typecheck plus shared-package unit smoke linkage
    post_run_quality:
      primary_commands:
        - yarn g:lint
        - yarn g:typecheck
        - yarn workspace @your-org/ts-utils test-unit
        - yarn workspace @your-org/core-lib test-unit
      diagnostic_commands:
        - yarn g:test-unit
      diagnostic_failure_mode: warn
    supported_scenarios:
      - release
      - governance
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 24
      max_added_lines: 1100
    size_rationale: Xlarge monorepo release missions are manual-only because they
      may cross several package/app boundaries and require operator judgement on
      release coherence, product value, and merge risk.
    change_budget:
      max_changed_files: 24
      max_added_lines: 1100
    quality_evidence:
      - delivery-manifest
      - release-packet
      - review-report
      - learning-loop-handoff
