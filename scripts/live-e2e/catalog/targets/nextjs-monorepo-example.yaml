catalog_id: nextjs-monorepo-example
repo:
  repo_id: belgattitude/nextjs-monorepo-example
  repo_url: https://github.com/belgattitude/nextjs-monorepo-example.git
  ref: main
  checkout_strategy: shallow
verification:
  setup_commands:
    - yarn install --immutable
  commands:
    - yarn g:lint
    - yarn g:typecheck
    - yarn workspace @your-org/ts-utils test-unit
    - yarn workspace @your-org/core-lib test-unit
safety_defaults:
  write_back_to_remote: false
  preferred_delivery_mode: fork-first-pr
feature_missions:
  - mission_id: nextjs-shared-package-release
    title: Prepare one shared-package release-shaped change
    brief: Update one shared package and one consuming app with bounded release evidence and no upstream write-back.
    allowed_paths:
      - apps/**
      - packages/**
    forbidden_paths:
      - docs/**
      - .github/**
      - scripts/**
      - examples/**
      - context/**
    expected_evidence:
      - delivery-manifest
      - release-packet
      - review-report
    acceptance_checks:
      - keep changes inside apps and packages only
      - preserve monorepo lint/typecheck plus shared-package unit smoke linkage
    change_budget:
      max_changed_files: 14
      max_added_lines: 420
