catalog_id: fastify
repo:
  repo_id: fastify/fastify
  repo_url: https://github.com/fastify/fastify.git
  ref: main
  checkout_strategy: shallow
verification:
  setup_commands:
    - npm install
  commands:
    - npm run test:ci
    - npm run lint
safety_defaults:
  write_back_to_remote: false
  preferred_delivery_mode: patch-only
required_matrix_cells:
  - cell_id: fastify.repair.medium.openai
    scenario_family: repair
    feature_size: medium
    feature_mission_id: fastify-schema-plugin-repair
    provider_variant_id: openai-primary
    coverage_tier: extended
provider_comparison_pairs: []
feature_missions:
  - mission_id: fastify-schema-plugin-repair
    title: Repair one schema and plugin lifecycle seam
    brief: Fix one bounded schema validation, plugin registration, or lifecycle
      hook behavior with focused tests and type evidence.
    feature_size: medium
    goals:
      - Repair one schema/plugin lifecycle behavior without changing unrelated
        request handling.
      - Keep unit, type, and lint evidence green.
    kpis:
      - kpi_id: fastify-schema-plugin-green
        name: Fastify schema plugin gate
        target: npm run test:ci and npm run lint pass after the change
        measurement: post-run primary verification
    definition_of_done:
      - Tests cover the repaired schema/plugin lifecycle behavior.
      - Public type behavior remains coherent for the touched API.
      - Review and delivery evidence remain anchored to the target checkout.
    expected_evidence: &evidence
      - verify-summary
      - routed-step-result
      - review-report
      - delivery-manifest
    acceptance_checks:
      - keep the change inside Fastify runtime, tests, types, or validation
        build artifacts required by the repair
      - preserve unit, type, and lint evidence
      - avoid any upstream write-back
    post_run_quality:
      primary_commands:
        - npm run test:ci
        - npm run lint
      diagnostic_commands:
        - npm run test
      diagnostic_failure_mode: warn
    supported_scenarios:
      - repair
      - regress
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 12
      max_added_lines: 420
    size_rationale: Medium Fastify repairs may cross runtime hooks, validation
      tests, and types but should stay within one lifecycle seam.
    change_budget:
      max_changed_files: 12
      max_added_lines: 420
    quality_evidence: *evidence
