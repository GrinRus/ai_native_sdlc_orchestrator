catalog_id: fastify
repo:
  repo_id: fastify/fastify
  repo_url: https://github.com/fastify/fastify.git
  ref: main
  checkout_strategy: shallow
verification:
  setup_commands:
    - npm install
  commands:
    - npm run test:ci
    - npm run lint
safety_defaults:
  write_back_to_remote: false
  preferred_delivery_mode: patch-only
required_matrix_cells:
  - cell_id: fastify.repair.medium.openai
    scenario_family: repair
    feature_size: medium
    feature_mission_id: fastify-schema-plugin-repair
    provider_variant_id: openai-primary
    coverage_tier: extended
provider_comparison_pairs: []
feature_missions:
  - mission_id: fastify-schema-plugin-repair
    title: Repair one schema and plugin lifecycle seam
    brief: Fix one bounded schema validation, plugin registration, or lifecycle hook behavior with
      focused tests and type evidence.
    feature_size: medium
    goals:
      - Repair one schema/plugin lifecycle behavior without changing unrelated request handling.
      - Keep unit, type, and lint evidence green.
    kpis:
      - kpi_id: fastify-schema-plugin-green
        name: Fastify schema plugin gate
        target: npm run test:ci and npm run lint pass after the change
        measurement: post-run primary verification
    definition_of_done:
      - Tests cover the repaired schema/plugin lifecycle behavior.
      - Public type behavior remains coherent for the touched API.
      - Review and delivery evidence remain anchored to the target checkout.
    expected_evidence: &a1
      - verify-summary
      - routed-step-result
      - review-report
      - delivery-manifest
    acceptance_checks:
      - keep the change inside Fastify runtime, tests, types, or validation build artifacts required
        by the repair
      - preserve unit, type, and lint evidence
      - avoid any upstream write-back
    post_run_quality:
      primary_commands:
        - npm run test:ci
        - npm run lint
      diagnostic_commands:
        - npm run test
      diagnostic_failure_mode: warn
    supported_scenarios:
      - repair
      - regress
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 32
      max_added_lines: 2200
    size_rationale: Medium Fastify repairs may cross runtime hooks, validation tests, and types but
      should stay within one lifecycle seam.
    change_budget:
      max_changed_files: 32
      max_added_lines: 2200
    quality_evidence: *a1
    mission_class: product-change
    agent_visible_request:
      user_problem: Fix one bounded schema validation, plugin registration, or lifecycle hook behavior
        with focused tests and type evidence.
      desired_outcome: Tests cover the repaired schema/plugin lifecycle behavior. Public type behavior
        remains coherent for the touched API. Review and delivery evidence remain anchored to the
        target checkout.
      constraints:
        - Deliver a real product change through the full public AOR flow, not a catalog-only or
          no-op patch.
        - Use the target repository conventions and existing test style.
        - Keep upstream writes disabled; materialize delivery evidence only through the configured
          no-write or patch/fork mode.
        - Do not mutate target files directly from the runner or evaluator outside the public AOR
          execution, review, and repair loop.
        - keep the change inside Fastify runtime, tests, types, or validation build artifacts
          required by the repair
        - preserve unit, type, and lint evidence
        - avoid any upstream write-back
      non_goals:
        - Do not satisfy the mission with documentation-only, fixture-only, or metadata-only churn
          unless the requested product behavior explicitly requires it.
        - Do not write provider-local state, editor artifacts, temporary runtime files, or unrelated
          root files into the target diff.
        - Do not bypass AOR review, QA, delivery, or learning artifacts with a direct patch handoff.
    evaluator_rubric:
      quality_gate: accepted-step-quality-required
      step_quality_required: true
      step_quality_dimensions:
        - traceability
        - completeness
        - actionability
        - evidence_strength
        - black_box_boundary
      evidence_expectations:
        - Accepted step-quality assessment report for every public SDLC step before continuation.
        - verify-summary
        - routed-step-result
        - review-report
        - delivery-manifest
        - "Primary verification command: npm run test:ci"
        - "Primary verification command: npm run lint"
        - "Diagnostic evidence command: npm run test"
    final_code_rubric:
      quality_gate: all-pass-product-quality
      required_changed_surfaces: []
      acceptance_dimensions:
        - implementation_correctness
        - implementation_completeness
        - test_adequacy
        - code_maintainability
        - verification_quality
        - delivery_safety
        - acceptance_criteria_traceability
