catalog_id: ruff
repo:
  repo_id: astral-sh/ruff
  repo_url: https://github.com/astral-sh/ruff.git
  ref: main
  checkout_strategy: shallow
verification:
  setup_commands:
    - cargo fetch
  commands:
    - cargo test -p ruff_linter
    - cargo test -p ruff_python_formatter
safety_defaults:
  write_back_to_remote: false
  preferred_delivery_mode: patch-only
required_matrix_cells:
  - cell_id: ruff.regress.large.openai
    scenario_family: regress
    feature_size: large
    feature_mission_id: ruff-rule-autofix-regression
    provider_variant_id: openai-primary
    coverage_tier: extended
provider_comparison_pairs: []
feature_missions:
  - mission_id: ruff-rule-autofix-regression
    title: Preserve one Ruff rule autofix regression
    brief: Add or repair one bounded Python lint rule or autofix edge case with Rust test and fixture
      evidence while avoiding broad formatter or rule churn.
    feature_size: large
    goals:
      - Preserve one lint rule or autofix behavior with focused fixture evidence.
      - Keep the relevant Rust crate tests green.
      - Treat this target as extended until build and snapshot costs are proven stable in live E2E.
    kpis:
      - kpi_id: ruff-rule-autofix-green
        name: Ruff rule autofix gate
        target: ruff_linter and formatter crate tests pass after the change
        measurement: post-run primary verification
    definition_of_done:
      - Rule fixture or snapshot evidence demonstrates the fixed behavior.
      - The changed rule avoids unrelated diagnostics or formatting churn.
      - Review and delivery evidence remain anchored to the target checkout.
    expected_evidence: &a1
      - verify-summary
      - routed-step-result
      - review-report
      - delivery-manifest
    acceptance_checks:
      - keep the change inside one lint rule, fixture, snapshot, or supporting diagnostic surface
      - preserve relevant Rust crate test evidence
      - avoid broad generated documentation or schema churn unless the rule change explicitly
        requires it
      - avoid any upstream write-back
    post_run_quality:
      primary_commands:
        - cargo test -p ruff_linter
        - cargo test -p ruff_python_formatter
      diagnostic_commands:
        - cargo clippy -p ruff_linter --all-targets -- -D warnings
      diagnostic_failure_mode: warn
    supported_scenarios:
      - regress
      - repair
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 64
      max_added_lines: 4500
    size_rationale: Ruff rule/autofix work can cross Rust rule logic, fixtures, snapshots, and generated
      metadata, so it stays large and extended until live baseline cost is proven stable.
    change_budget:
      max_changed_files: 64
      max_added_lines: 4500
    quality_evidence: *a1
    mission_class: product-change
    agent_visible_request:
      user_problem: Add or repair one bounded Python lint rule or autofix edge case with Rust test and
        fixture evidence while avoiding broad formatter or rule churn.
      desired_outcome: Rule fixture or snapshot evidence demonstrates the fixed behavior. The changed rule
        avoids unrelated diagnostics or formatting churn. Review and delivery evidence remain
        anchored to the target checkout.
      constraints:
        - Deliver a real product change through the full public AOR flow, not a catalog-only or
          no-op patch.
        - Use the target repository conventions and existing test style.
        - Keep upstream writes disabled; materialize delivery evidence only through the configured
          no-write or patch/fork mode.
        - Do not mutate target files directly from the runner or evaluator outside the public AOR
          execution, review, and repair loop.
        - keep the change inside one lint rule, fixture, snapshot, or supporting diagnostic surface
        - preserve relevant Rust crate test evidence
        - avoid broad generated documentation or schema churn unless the rule change explicitly
          requires it
        - avoid any upstream write-back
      non_goals:
        - Do not satisfy the mission with documentation-only, fixture-only, or metadata-only churn
          unless the requested product behavior explicitly requires it.
        - Do not write provider-local state, editor artifacts, temporary runtime files, or unrelated
          root files into the target diff.
        - Do not bypass AOR review, QA, delivery, or learning artifacts with a direct patch handoff.
    evaluator_rubric:
      quality_gate: accepted-step-quality-required
      step_quality_required: true
      step_quality_dimensions:
        - traceability
        - completeness
        - actionability
        - evidence_strength
        - black_box_boundary
      evidence_expectations:
        - Accepted step-quality assessment report for every public SDLC step before continuation.
        - verify-summary
        - routed-step-result
        - review-report
        - delivery-manifest
        - "Primary verification command: cargo test -p ruff_linter"
        - "Primary verification command: cargo test -p ruff_python_formatter"
        - "Diagnostic evidence command: cargo clippy -p ruff_linter --all-targets -- -D warnings"
    final_code_rubric:
      quality_gate: all-pass-product-quality
      required_changed_surfaces: []
      acceptance_dimensions:
        - implementation_correctness
        - implementation_completeness
        - test_adequacy
        - code_maintainability
        - verification_quality
        - delivery_safety
        - acceptance_criteria_traceability
