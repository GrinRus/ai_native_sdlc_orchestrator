  - mission_id: httpie-cli-request-policy-orchestration-xlarge
    title: Govern a cross-surface request policy change
    brief: Manually rehearse a broad CLI request-policy change that spans configuration precedence,
      request construction, diagnostics, and tests with strict audit and learning closure.
    feature_size: xlarge
    execution_policy: manual-only
    goals:
      - Harden a coherent request policy across CLI/config parsing, request construction, and
        diagnostics.
      - Preserve user-visible CLI behavior with explicit tests for precedence, formatting, and
        failure messages.
      - Preserve governance, audit, and learning lineage for the target checkout.
    kpis:
      - kpi_id: httpie-xlarge-request-policy-depth
        name: Request policy depth
        target: runtime source, CLI/config tests, diagnostics, and user-facing behavior evidence trace to
