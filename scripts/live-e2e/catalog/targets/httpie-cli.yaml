catalog_id: httpie-cli
repo:
  repo_id: httpie/cli
  repo_url: https://github.com/httpie/cli.git
  ref: master
  checkout_strategy: shallow
verification:
  setup_commands:
    - make install
  commands:
    - venv/bin/python -m pytest tests/test_cli.py tests/test_output.py tests/test_regressions.py
      tests/test_httpie_cli.py
    - make codestyle
safety_defaults:
  write_back_to_remote: false
  preferred_delivery_mode: patch-only
required_matrix_cells:
  - cell_id: httpie-cli.regress.small.openai
    scenario_family: regress
    feature_size: small
    feature_mission_id: httpie-cli-output-regression
    provider_variant_id: openai-primary
    coverage_tier: required
  - cell_id: httpie-cli.regress.small.anthropic
    scenario_family: regress
    feature_size: small
    feature_mission_id: httpie-cli-output-regression
    provider_variant_id: anthropic-primary
    coverage_tier: extended
  - cell_id: httpie-cli.repair.medium.anthropic
    scenario_family: repair
    feature_size: medium
    feature_mission_id: httpie-cli-repair-exit-codes
    provider_variant_id: anthropic-primary
    coverage_tier: required
  - cell_id: httpie-cli.governance.medium.openai
    scenario_family: governance
    feature_size: medium
    feature_mission_id: httpie-cli-repair-exit-codes
    provider_variant_id: openai-primary
    coverage_tier: required
  - cell_id: httpie-cli.governance.large.openai
    scenario_family: governance
    feature_size: large
    feature_mission_id: httpie-cli-config-surface-hardening
    provider_variant_id: openai-primary
    coverage_tier: extended
provider_comparison_pairs:
  - pair_id: httpie-cli.regress.small
    scenario_family: regress
    feature_size: small
    feature_mission_id: httpie-cli-output-regression
    provider_variants:
      - openai-primary
      - anthropic-primary
manual_matrix_cells:
  - cell_id: httpie-cli.governance.xlarge.openai
    scenario_family: governance
    feature_size: xlarge
    feature_mission_id: httpie-cli-request-policy-orchestration-xlarge
    provider_variant_id: openai-primary
    coverage_tier: manual
  - cell_id: httpie-cli.governance.xlarge.anthropic
    scenario_family: governance
    feature_size: xlarge
    feature_mission_id: httpie-cli-request-policy-orchestration-xlarge
    provider_variant_id: anthropic-primary
    coverage_tier: manual
feature_missions:
  - mission_id: httpie-cli-output-regression
    title: Preserve one bounded CLI output regression
    brief: Implement one narrow CLI behavior fix with matching regression coverage and keep the blast
      radius inside the relevant command surface.
    feature_size: small
    expected_evidence: &a1
      - verify-summary
      - routed-step-result
      - review-report
    acceptance_checks:
      - keep the change isolated to one CLI behavior surface
      - preserve bounded CLI regression smoke plus codestyle linkage
    supported_scenarios:
      - regress
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 16
      max_added_lines: 900
    size_rationale: Small httpie missions should remain inside one CLI surface with one focused regression slice.
    change_budget:
      max_changed_files: 16
      max_added_lines: 900
    quality_evidence: *a1
    mission_class: flow-regression
    agent_visible_request:
      user_problem: Implement one narrow CLI behavior fix with matching regression coverage and keep the
        blast radius inside the relevant command surface.
      desired_outcome: Implement one narrow CLI behavior fix with matching regression coverage and keep
        the blast radius inside the relevant command surface.
      constraints:
        - Use this mission only as a live E2E canary that proves the public flow still works.
        - Use the target repository conventions and existing test style.
        - Keep upstream writes disabled; materialize delivery evidence only through the configured
          no-write or patch/fork mode.
        - Do not mutate target files directly from the runner or evaluator outside the public AOR
          execution, review, and repair loop.
        - keep the change isolated to one CLI behavior surface
        - preserve bounded CLI regression smoke plus codestyle linkage
      non_goals:
        - Do not expand this small canary into a product-quality acceptance mission.
        - Do not write provider-local state, editor artifacts, temporary runtime files, or unrelated
          root files into the target diff.
        - Do not bypass AOR review, QA, delivery, or learning artifacts with a direct patch handoff.
    evaluator_rubric:
      quality_gate: flow-health
      step_quality_required: false
      step_quality_dimensions:
        - traceability
        - completeness
        - actionability
        - evidence_strength
        - black_box_boundary
      evidence_expectations:
        - Accepted public step decision refs for the canary flow.
        - verify-summary
        - routed-step-result
        - review-report
    final_code_rubric:
      quality_gate: flow-health
      required_changed_surfaces: []
      acceptance_dimensions:
        - flow_completion
        - public_artifact_materialization
        - canary_verification
  - mission_id: httpie-cli-repair-exit-codes
    title: Repair one bounded CLI exit-code and formatting seam
    brief: "Fix the plugin upgrade failure propagation and debug formatting seam in
      `httpie/manager/tasks/plugins.py`: `PluginInstaller.upgrade()` must return the `_install()`
      exit status after handling pip stdout so failed installs are not coerced to success, and debug
      pip stderr must use `textwrap.indent(stderr, '  ')` so every stderr line is indented
      correctly. Add focused regression coverage in `tests/test_httpie_cli.py` for failed upgrade
      propagation, successful upgrade return, and debug stderr indentation while preserving the
      bounded pytest and codestyle slice. The primary pytest command must complete without stderr
      warning tokens, and new regression tests must use cleanup-safe fixtures or context-managed
      resources."
    feature_size: medium
    goals:
      - Repair failed plugin upgrade exit status propagation and debug stderr indentation.
      - Keep the bounded CLI pytest and codestyle evidence green.
    kpis:
      - kpi_id: httpie-exit-code-repair-green
        name: Exit-code repair gate
        target: bounded CLI pytest slice and make codestyle pass after the change
        measurement: post-run primary verification
    definition_of_done:
      - Failed plugin upgrade installs return the failing install status.
      - Debug pip stderr lines are indented consistently.
      - Delivery and review evidence are anchored to the target checkout.
    expected_evidence: &a2
      - verify-summary
      - routed-step-result
      - review-report
      - delivery-manifest
    acceptance_checks:
      - keep the fix inside the CLI/runtime surface and its tests
      - preserve failed plugin upgrade exit status instead of falling through to implicit success
      - indent every debug pip stderr line with two spaces
      - primary pytest stderr has no runtime warning tokens
      - prefer cleanup-safe pytest fixtures or context-managed resources in new tests
      - preserve bounded pytest smoke plus codestyle linkage
      - keep delivery evidence anchored to the target checkout
    change_evidence:
      required_path_prefixes:
        - httpie/manager/tasks/plugins.py
        - tests/test_httpie_cli.py
    post_run_quality:
      primary_commands:
        - venv/bin/python -m pytest tests/test_httpie_cli.py
        - make codestyle
      diagnostic_commands:
        - venv/bin/python -m pytest tests/test_cli.py tests/test_regressions.py
          tests/test_httpie_cli.py
      diagnostic_failure_mode: warn
    supported_scenarios:
      - repair
      - governance
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 32
      max_added_lines: 2200
    size_rationale: Medium httpie missions can cross one producer-consumer CLI boundary but should
      remain inside one subsystem and test slice.
    change_budget:
      max_changed_files: 32
      max_added_lines: 2200
    quality_evidence: *a2
    mission_class: product-change
    agent_visible_request:
      user_problem: "Fix the plugin upgrade failure propagation and debug formatting seam in
        `httpie/manager/tasks/plugins.py`: `PluginInstaller.upgrade()` must return the `_install()`
        exit status after handling pip stdout so failed installs are not coerced to success, and
        debug pip stderr must use `textwrap.indent(stderr, '  ')` so every stderr line is indented
        correctly. Add focused regression coverage in `tests/test_httpie_cli.py` for failed upgrade
        propagation, successful upgrade return, and debug stderr indentation while preserving the
        bounded pytest and codestyle slice. The primary pytest command must complete without stderr
        warning tokens, and new regression tests must use cleanup-safe fixtures or context-managed
        resources."
      desired_outcome: Failed plugin upgrade installs return the failing install status. Debug pip stderr
        lines are indented consistently. Delivery and review evidence are anchored to the target
        checkout.
      constraints:
        - Deliver a real product change through the full public AOR flow, not a catalog-only or
          no-op patch.
        - Use the target repository conventions and existing test style.
        - Keep upstream writes disabled; materialize delivery evidence only through the configured
          no-write or patch/fork mode.
        - Do not mutate target files directly from the runner or evaluator outside the public AOR
          execution, review, and repair loop.
        - keep the fix inside the CLI/runtime surface and its tests
        - preserve failed plugin upgrade exit status instead of falling through to implicit success
        - indent every debug pip stderr line with two spaces
        - primary pytest stderr has no runtime warning tokens
        - prefer cleanup-safe pytest fixtures or context-managed resources in new tests
        - preserve bounded pytest smoke plus codestyle linkage
        - keep delivery evidence anchored to the target checkout
      non_goals:
        - Do not satisfy the mission with documentation-only, fixture-only, or metadata-only churn
          unless the requested product behavior explicitly requires it.
        - Do not write provider-local state, editor artifacts, temporary runtime files, or unrelated
          root files into the target diff.
        - Do not bypass AOR review, QA, delivery, or learning artifacts with a direct patch handoff.
    evaluator_rubric:
      quality_gate: accepted-step-quality-required
      step_quality_required: true
      step_quality_dimensions:
        - traceability
        - completeness
        - actionability
        - evidence_strength
        - black_box_boundary
      evidence_expectations:
        - Accepted step-quality assessment report for every public SDLC step before continuation.
        - verify-summary
        - routed-step-result
        - review-report
        - delivery-manifest
        - "Primary verification command: venv/bin/python -m pytest tests/test_httpie_cli.py"
        - "Primary verification command: make codestyle"
        - "Diagnostic evidence command: venv/bin/python -m pytest tests/test_cli.py
          tests/test_regressions.py tests/test_httpie_cli.py"
        - Meaningful changed path under httpie/manager/tasks/plugins.py
        - Meaningful changed path under tests/test_httpie_cli.py
    final_code_rubric:
      quality_gate: all-pass-product-quality
      required_changed_surfaces:
        - httpie/manager/tasks/plugins.py
        - tests/test_httpie_cli.py
      acceptance_dimensions:
        - implementation_correctness
        - implementation_completeness
        - test_adequacy
        - code_maintainability
        - verification_quality
        - delivery_safety
        - acceptance_criteria_traceability
