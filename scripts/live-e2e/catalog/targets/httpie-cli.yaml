catalog_id: httpie-cli
repo:
  repo_id: httpie/cli
  repo_url: https://github.com/httpie/cli.git
  ref: master
  checkout_strategy: shallow
verification:
  setup_commands:
    - make install
  commands:
    - venv/bin/python -m pytest tests/test_cli.py tests/test_output.py tests/test_regressions.py tests/test_httpie_cli.py
    - make codestyle
safety_defaults:
  write_back_to_remote: false
  preferred_delivery_mode: patch
feature_missions:
  - mission_id: httpie-cli-output-regression
    title: Preserve one bounded CLI output regression
    brief: Implement one narrow CLI behavior fix with matching regression coverage and keep the blast radius inside the relevant command surface.
    allowed_paths:
      - httpie/**
      - tests/**
    forbidden_paths:
      - docs/**
      - .github/**
      - scripts/**
      - examples/**
      - context/**
    expected_evidence:
      - verify-summary
      - routed-step-result
      - review-report
    acceptance_checks:
      - keep the change isolated to one CLI behavior surface
      - preserve bounded CLI regression smoke plus codestyle linkage
    change_budget:
      max_changed_files: 10
      max_added_lines: 320
