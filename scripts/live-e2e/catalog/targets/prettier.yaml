catalog_id: prettier
repo:
  repo_id: prettier/prettier
  repo_url: https://github.com/prettier/prettier.git
  ref: main
  checkout_strategy: shallow
verification:
  setup_commands:
    - yarn install --immutable
  commands:
    - yarn lint:typecheck
    - yarn lint:eslint
    - yarn test tests/format/typescript tests/format/markdown
safety_defaults:
  write_back_to_remote: false
  preferred_delivery_mode: patch-only
required_matrix_cells:
  - cell_id: prettier.regress.medium.openai
    scenario_family: regress
    feature_size: medium
    feature_mission_id: prettier-typescript-format-regression
    provider_variant_id: openai-primary
    coverage_tier: extended
provider_comparison_pairs: []
feature_missions:
  - mission_id: prettier-typescript-format-regression
    title: Preserve TypeScript formatting regression behavior
    brief: Add or repair one bounded TypeScript or Markdown formatting edge case with snapshot evidence
      and parser/printer checks.
    feature_size: medium
    goals:
      - Preserve one deterministic formatting behavior without broad snapshot churn.
      - Keep typecheck, ESLint, and focused format snapshot evidence green.
    kpis:
      - kpi_id: prettier-typescript-format-green
        name: Prettier TypeScript format gate
        target: focused format tests plus typecheck and ESLint pass after the change
        measurement: post-run primary verification
    definition_of_done:
      - Snapshot changes are limited to the intended parser/printer behavior.
      - The changed formatter behavior is covered by focused tests.
      - Review and delivery evidence remain anchored to the target checkout.
    expected_evidence: &a1
      - verify-summary
      - routed-step-result
      - review-report
      - delivery-manifest
    acceptance_checks:
      - keep the change inside one parser/printer surface, tests, and snapshots
      - preserve typecheck, ESLint, and focused snapshot evidence
      - avoid broad unrelated snapshot churn
      - avoid any upstream write-back
    post_run_quality:
      primary_commands:
        - yarn lint:typecheck
        - yarn lint:eslint
        - yarn test tests/format/typescript tests/format/markdown
      diagnostic_commands:
        - yarn lint
      diagnostic_failure_mode: warn
    supported_scenarios:
      - regress
      - repair
    recommended_provider_variants:
      - openai-primary
      - anthropic-primary
    size_budget:
      max_changed_files: 32
      max_added_lines: 2200
    size_rationale: Medium Prettier work may touch a parser/printer and snapshot fixtures but should
      avoid broad formatting churn.
    change_budget:
      max_changed_files: 32
      max_added_lines: 2200
    quality_evidence: *a1
    mission_class: product-change
    agent_visible_request:
      user_problem: Add or repair one bounded TypeScript or Markdown formatting edge case with snapshot
        evidence and parser/printer checks.
      desired_outcome: Snapshot changes are limited to the intended parser/printer behavior. The changed
        formatter behavior is covered by focused tests. Review and delivery evidence remain anchored
        to the target checkout.
      constraints:
        - Deliver a real product change through the full public AOR flow, not a catalog-only or
          no-op patch.
        - Use the target repository conventions and existing test style.
        - Keep upstream writes disabled; materialize delivery evidence only through the configured
          no-write or patch/fork mode.
        - Do not mutate target files directly from the runner or evaluator outside the public AOR
          execution, review, and repair loop.
        - keep the change inside one parser/printer surface, tests, and snapshots
        - preserve typecheck, ESLint, and focused snapshot evidence
        - avoid broad unrelated snapshot churn
        - avoid any upstream write-back
      non_goals:
        - Do not satisfy the mission with documentation-only, fixture-only, or metadata-only churn
          unless the requested product behavior explicitly requires it.
        - Do not write provider-local state, editor artifacts, temporary runtime files, or unrelated
          root files into the target diff.
        - Do not bypass AOR review, QA, delivery, or learning artifacts with a direct patch handoff.
    evaluator_rubric:
      quality_gate: accepted-step-quality-required
      step_quality_required: true
      step_quality_dimensions:
        - traceability
        - completeness
        - actionability
        - evidence_strength
        - black_box_boundary
      evidence_expectations:
        - Accepted step-quality assessment report for every public SDLC step before continuation.
        - verify-summary
        - routed-step-result
        - review-report
        - delivery-manifest
        - "Primary verification command: yarn lint:typecheck"
        - "Primary verification command: yarn lint:eslint"
        - "Primary verification command: yarn test tests/format/typescript tests/format/markdown"
        - "Diagnostic evidence command: yarn lint"
    final_code_rubric:
      quality_gate: all-pass-product-quality
      required_changed_surfaces: []
      acceptance_dimensions:
        - implementation_correctness
        - implementation_completeness
        - test_adequacy
        - code_maintainability
        - verification_quality
        - delivery_safety
        - acceptance_criteria_traceability
