profile_id: live-e2e.full-journey.governance.pluggy.medium.openai
version: 1
journey_mode: full-journey
flow_kind: governance
duration_class: long
live_e2e:
  flow_range_policy: delivery_default
  installation_policy: source-install-required
  interaction_capability: public-control-plane
  frontend_capability: none
  safety_policy: no-upstream-write
target_catalog_id: pluggy
feature_mission_id: pluggy-typing-governance
scenario_family: governance
provider_variant_id: openai-primary
bootstrap_template: github-default
runtime:
  mode: ephemeral
  runtime_root: .aor
  persist_workspace: false
stages:
  - bootstrap
  - discovery
  - spec
  - planning
  - handoff
  - execution
  - review
  - qa
  - delivery
  - learning
verification:
  build: true
  lint: true
  tests: project-default
  eval_suites:
    - suite.governance.integration@v1
  harness:
    enabled: true
    asset_ref: wrapper://wrapper.eval.default@v1
    subject_ref: wrapper://wrapper.eval.default@v1
    suite_ref: suite.cert.core@v4
    step_class: implement
output_policy:
  materialize_release_packet: false
  write_back_to_remote: false
  preferred_delivery_mode: patch-only
