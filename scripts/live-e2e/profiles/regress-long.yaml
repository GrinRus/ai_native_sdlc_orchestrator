profile_id: live-e2e.regress.long
version: 1
flow_kind: regress
duration_class: long
project_profile_template_ref: examples/project.github.aor.yaml
scenario_id: httpie-regression-deep
target_repo:
  repo_id: target
  repo_url: https://github.com/httpie/cli.git
  ref: main
  checkout_strategy: shallow
  write_target: patch-or-fork
preflight:
  mode: no-write
  sequence:
    - clone
    - inspect
    - analyze
    - validate
    - verify
    - stop
  prerequisites:
    - python, pip, and make available
    - network access for shallow clone and dependency setup
  repo_shape_notes:
    - medium Python CLI with make-based checks
  failure_safe_defaults:
    - keep output_policy.write_back_to_remote set to false
    - keep preferred delivery mode in fork-safe options only
  abort_conditions:
    - repository clone fails or ref cannot be resolved
    - make test or make codestyle fails during preflight verification
    - any command requests upstream write-back
  reusable_assumptions:
    bootstrap: clone and profile loading can run without write-back credentials
    quality: bounded regression verification uses make targets as preflight gates
    delivery: patch or fork-local artifacts remain sufficient for rehearsal completion
runtime:
  mode: ephemeral
  runtime_root: .aor
  persist_workspace: false
objective:
  title: Live E2E deep regression rehearsal on httpie/cli
  task_brief:
    - bootstrap the repository and confirm Python verification path
    - apply one bounded regression fix with tests
    - produce patch output or a fork-local branch only
  success_definition:
    - source checkout succeeds
    - handoff packet is materialized
    - execution completes with evidence
    - make test and make codestyle pass
stages:
  - bootstrap
  - discovery
  - spec
  - planning
  - handoff
  - execution
  - review
  - qa
verification:
  build: false
  lint: true
  tests: project-default
  setup_commands:
    - python -m pip install -e .[test]
  commands:
    - make test
    - make codestyle
  eval_suites:
    - suite.regress.long@v1
  harness:
    enabled: false
budgets:
  wall_clock_limit_min: 45
  max_changed_files: 12
  max_cost_usd: 20
approvals:
  handoff: required
  release: skipped
output_policy:
  materialize_release_packet: false
  write_back_to_remote: false
  preferred_delivery_mode: patch-only
ui:
  attachable: true
  default_scope: run
