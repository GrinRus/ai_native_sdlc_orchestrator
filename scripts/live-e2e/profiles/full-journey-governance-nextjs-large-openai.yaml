profile_id: live-e2e.full-journey.governance.nextjs.large.openai
version: 1
journey_mode: full-journey
flow_kind: governance
duration_class: long
target_catalog_id: nextjs-monorepo-example
feature_mission_id: nextjs-shared-package-release
scenario_family: governance
provider_variant_id: openai-primary
bootstrap_template: github-default
runtime:
  mode: ephemeral
  runtime_root: .aor
  persist_workspace: false
stages:
  - bootstrap
  - discovery
  - spec
  - planning
  - handoff
  - execution
  - review
  - qa
  - delivery
  - learning
verification:
  build: true
  lint: true
  tests: project-default
  eval_suites:
    - suite.release.short@v1
  harness:
    enabled: false
output_policy:
  materialize_release_packet: false
  write_back_to_remote: false
  preferred_delivery_mode: fork-first-pr
