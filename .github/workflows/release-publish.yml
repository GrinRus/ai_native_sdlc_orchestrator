name: Release publish

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  id-token: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm CLI alpha
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/v') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'release:publish')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AOR_RELEASE_BRANCH: ${{ github.event.pull_request.head.ref }}
      AOR_RELEASE_STRICT_BRANCH: "true"
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.14.0
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Setup npm for trusted publishing
        run: npm install -g npm@11.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release event
        id: guard
        run: node ./scripts/release-event-guard.mjs

      - name: Run release gate on merge commit
        run: pnpm release:gate

      - name: Reconcile alpha publication transaction
        env:
          RELEASE_TAG: ${{ steps.guard.outputs.tag }}
          RELEASE_VERSION: ${{ steps.guard.outputs.version }}
          RELEASE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: node ./scripts/release-publish-transaction.mjs
